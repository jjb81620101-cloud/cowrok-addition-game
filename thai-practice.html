<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 ฝึกฟังภาษาไทย</title>
<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --pink:#FF6B9D; --purple:#9B59B6; --blue:#3D5AF1; --green:#00C853; --gold:#FFD700; }
body {
  font-family:'Microsoft JhengHei','微軟正黑體','PingFang TC',sans-serif;
  background:linear-gradient(160deg,#FFF0F5 0%,#E8F4FF 40%,#F5FFF0 100%);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:16px 12px 40px;
}

/* ── Header ── */
.title-area { text-align:center; margin-bottom:12px; }
.title-area h1 {
  font-size:clamp(1.5rem,5vw,2.2rem); font-weight:900;
  color:var(--pink); text-shadow:3px 3px 0 #FFB3D1;
  animation:wiggle 3s ease-in-out infinite;
}
@keyframes wiggle { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
.subtitle { font-size:0.9rem; color:var(--purple); font-weight:700; margin-top:4px; min-height:22px; }

/* ── Mode tabs ── */
.mode-tabs { display:flex; gap:8px; margin-bottom:14px; }
.mode-tab {
  border:none; border-radius:50px; padding:9px 22px;
  font-size:0.9rem; font-weight:700; cursor:pointer;
  font-family:inherit; transition:all 0.2s;
  background:rgba(255,255,255,0.7); color:#888; border:2px solid #e0e0e0;
}
.mode-tab.active { background:linear-gradient(135deg,var(--purple),#5B2C8D); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(155,89,182,0.35); }

/* ── Score bar ── */
.top-bar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
.streak-badge {
  display:flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  border-radius:50px; padding:8px 16px;
  box-shadow:0 4px 14px rgba(255,165,0,0.4); border:3px solid rgba(255,255,255,0.6);
}
.streak-badge.bump { animation:bump 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18) rotate(-3deg)} }
.s-icon { font-size:1.3rem; }
.s-label,.s-suffix { font-size:0.85rem; font-weight:900; color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.25); }
.s-num { font-size:1.7rem; font-weight:900; color:#fff; min-width:32px; text-align:center; }
.score-badge {
  display:flex; align-items:center;
  background:linear-gradient(135deg,#A78BFA,#7C3AED);
  border-radius:50px; padding:8px 16px;
  box-shadow:0 4px 14px rgba(124,58,237,0.35); border:3px solid rgba(255,255,255,0.5);
}
.score-text { font-size:0.9rem; font-weight:900; color:#fff; }

/* ── Speaker card ── */
.speaker-card {
  background:#fff; border-radius:28px; padding:20px 36px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1); border:4px solid #E8D5FF;
  margin-bottom:14px; text-align:center; width:100%; max-width:420px;
}
.q-label { font-size:0.82rem; color:#bbb; font-weight:700; margin-bottom:12px; letter-spacing:1px; }
.speaker-btn {
  width:88px; height:88px; border-radius:50%;
  background:linear-gradient(135deg,#A78BFA,#7C3AED);
  border:none; cursor:pointer; font-size:2.8rem;
  display:flex; align-items:center; justify-content:center; margin:0 auto 10px;
  box-shadow:0 8px 24px rgba(124,58,237,0.4), 0 0 0 0 rgba(124,58,237,0.3);
  transition:transform 0.15s; -webkit-tap-highlight-color:transparent;
}
.speaker-btn:active { transform:scale(0.92); }
.speaker-btn.playing { animation:speakPulse 0.7s ease infinite alternate, ripple 1s ease infinite; }
@keyframes speakPulse { from{transform:scale(1)} to{transform:scale(1.1)} }
@keyframes ripple {
  0%   { box-shadow:0 8px 24px rgba(124,58,237,0.4), 0 0 0 0   rgba(124,58,237,0.4); }
  100% { box-shadow:0 8px 24px rgba(124,58,237,0.4), 0 0 0 28px rgba(124,58,237,0); }
}
.replay-label { font-size:0.78rem; color:#aaa; font-weight:700; }

/* ══ QUIZ MODE ══ */
#quiz-mode { width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; }

.sel-section {
  width:100%; margin-bottom:10px;
  background:#fff; border-radius:20px; padding:12px 14px 14px;
  box-shadow:0 4px 16px rgba(0,0,0,0.07);
}
.sel-label {
  font-size:0.75rem; font-weight:900; color:#999; margin-bottom:8px;
  text-transform:uppercase; letter-spacing:1px;
}
.sel-row { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; }

.sel-btn {
  border:3px solid #e8e8e8; border-radius:14px;
  padding:9px 6px 8px; min-width:62px;
  background:#fafafa; cursor:pointer; font-family:inherit;
  transition:all 0.18s; -webkit-tap-highlight-color:transparent;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  flex:1; max-width:88px;
}
.sel-btn:active { transform:scale(0.92); }
.sel-char { font-size:1.7rem; font-weight:900; color:var(--blue); line-height:1; }
.sel-name { font-size:0.62rem; color:#aaa; font-weight:700; text-align:center; }
.sel-btn.selected {
  border-color:var(--gold); background:linear-gradient(135deg,#FFF9E0,#FFF3C4);
  box-shadow:0 0 0 2px var(--gold), 0 6px 16px rgba(255,215,0,0.35);
  transform:scale(1.06);
}
.sel-btn.correct-ans {
  border-color:var(--green) !important;
  background:linear-gradient(135deg,#E8FFF0,#C8FFE0) !important;
  animation:btnOK 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
.sel-btn.wrong-ans {
  border-color:#FF5252 !important;
  background:linear-gradient(135deg,#FFF0F0,#FFD6D6) !important;
  animation:btnNG 0.4s ease;
}
@keyframes btnOK { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18) rotate(-3deg)} }
@keyframes btnNG { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

.hint-box {
  max-width:420px; width:100%; background:#fff; border-radius:18px;
  padding:14px 18px; margin-top:4px;
  box-shadow:0 3px 14px rgba(0,0,0,0.07); border-left:5px solid var(--purple); display:none;
}
.hint-box.show { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.hint-title { font-size:0.78rem; color:var(--purple); font-weight:700; margin-bottom:6px; }
.hint-row { font-size:1rem; color:#555; line-height:2; }
.hint-row b { font-size:1.5rem; color:var(--blue); }

/* ══ MATCH MODE ══ */
#match-mode { width:100%; max-width:420px; display:none; flex-direction:column; align-items:center; }

.match-audio-bar {
  display:flex; align-items:center; gap:12px; margin-bottom:14px;
  background:#fff; border-radius:20px; padding:12px 20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08); border:2px solid #E8D5FF;
  width:100%;
}
.match-audio-bar .speaker-btn { width:56px; height:56px; font-size:1.8rem; margin:0; flex-shrink:0; }
.match-audio-bar .speaker-btn.playing { animation:speakPulse 0.7s ease infinite alternate; box-shadow:0 4px 16px rgba(124,58,237,0.5); }
.match-audio-info { flex:1; }
.match-audio-label { font-size:0.75rem; color:#aaa; font-weight:700; }
.match-audio-syllable { font-size:1.6rem; font-weight:900; color:var(--purple); min-height:36px; }

.match-row-label {
  font-size:0.7rem; font-weight:900; color:#bbb; letter-spacing:1px;
  text-transform:uppercase; text-align:center; margin-bottom:4px;
}
.match-arena {
  position:relative; width:100%;
}
.tile-row {
  display:flex; justify-content:space-around; align-items:center;
  padding:2px 0; gap:7px;
}
.tile {
  flex:1; max-width:90px; min-height:70px;
  background:#fff; border-radius:16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:1.8rem; font-weight:900; color:var(--blue);
  box-shadow:0 5px 16px rgba(0,0,0,0.1); border:3px solid #e8e8e8;
  cursor:pointer; transition:all 0.18s; user-select:none;
  -webkit-tap-highlight-color:transparent; position:relative; z-index:2;
}
.tile:active { transform:scale(0.92); }
.tile.tone-tile { border-top:4px solid #FF8C00; }
.tile.con-tile  { border-top:4px solid var(--blue); }
.tile.vow-tile  { border-top:4px solid var(--purple); }
.tile.selected {
  border-color:var(--gold) !important;
  box-shadow:0 0 0 3px var(--gold), 0 8px 20px rgba(255,215,0,0.4);
  transform:scale(1.08);
}
.tile.correct-tile {
  border-color:var(--green) !important;
  background:linear-gradient(135deg,#E8FFF0,#C8FFE0) !important;
  animation:btnOK 0.4s ease;
}
.tile.wrong-tile { animation:tileNG 0.4s ease; }
@keyframes tileNG { 0%,100%{border-color:#FF5252 !important; transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.tile-sub { font-size:0.6rem; color:#aaa; font-weight:700; margin-top:2px; text-align:center; padding:0 2px; }

.match-svg-layer {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:1; overflow:visible;
}
.spacer-row { height:64px; }

/* ── Confetti & Badge ── */
#cf-layer { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden; }
.cf { position:absolute;top:-30px;font-size:1.3rem;animation:cfFall linear forwards; }
@keyframes cfFall { 0%{opacity:1;transform:translateY(0) rotate(0)} 80%{opacity:1} 100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(0.4)} }
#big-badge { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:7rem;pointer-events:none;z-index:9998;transition:transform 0.22s cubic-bezier(0.175,0.885,0.32,1.275); }
#big-badge.show { transform:translate(-50%,-50%) scale(1); }
#big-badge.hide { transform:translate(-50%,-50%) scale(0);transition:transform 0.16s ease-in; }

@media(max-width:380px) {
  .tile { font-size:1.5rem; min-height:60px; max-width:74px; }
  .sel-btn { min-width:52px; }
  .sel-char { font-size:1.4rem; }
}
</style>
</head>
<body>
<div id="cf-layer"></div>
<div id="big-badge"></div>

<div class="title-area">
  <h1>🇹🇭 ฝึกฟังภาษาไทย</h1>
  <div class="subtitle" id="subtitle">ฟังเสียง แล้วเลือกวรรณยุกต์ พยัญชนะ สระ!</div>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" id="tab-quiz" onclick="setMode('quiz')">🎯 เลือกตอบ</button>
  <button class="mode-tab" id="tab-match" onclick="setMode('match')">🔗 จับคู่</button>
</div>

<div class="top-bar">
  <div class="streak-badge" id="streak-badge">
    <span class="s-icon">🏅</span>
    <span class="s-label">ต่อเนื่อง</span>
    <span class="s-num" id="s-num">0</span>
    <span class="s-suffix">ครั้ง</span>
  </div>
  <div class="score-badge">
    <span class="score-text" id="score-text">ถูก 0 / 0</span>
  </div>
</div>

<!-- ─── QUIZ MODE ─── -->
<div id="quiz-mode">
  <div class="speaker-card">
    <div class="q-label">🎵 ฟังเสียงพยางค์</div>
    <button class="speaker-btn" id="q-speaker-btn" onclick="speakCurrent('q-speaker-btn')">🔊</button>
    <div class="replay-label">แตะเพื่อเล่นซ้ำ</div>
  </div>

  <div class="sel-section">
    <div class="sel-label">🎵 วรรณยุกต์</div>
    <div class="sel-row" id="q-tone-row"></div>
  </div>
  <div class="sel-section">
    <div class="sel-label">🔤 พยัญชนะ</div>
    <div class="sel-row" id="q-con-row"></div>
  </div>
  <div class="sel-section">
    <div class="sel-label">🔵 สระ</div>
    <div class="sel-row" id="q-vow-row"></div>
  </div>

  <div class="hint-box" id="hint-box">
    <div class="hint-title">💡 คำใบ้</div>
    <div class="hint-row" id="hint-content"></div>
  </div>
</div>

<!-- ─── MATCH MODE ─── -->
<div id="match-mode">
  <div class="match-audio-bar">
    <button class="speaker-btn" id="m-speaker-btn" onclick="speakCurrent('m-speaker-btn')">🔊</button>
    <div class="match-audio-info">
      <div class="match-audio-label">แตะลำโพงเพื่อฟัง</div>
      <div class="match-audio-syllable" id="m-audio-syllable">???</div>
    </div>
  </div>

  <div class="match-arena" id="match-arena">
    <svg class="match-svg-layer" id="match-svg"></svg>
    <div class="match-row-label">วรรณยุกต์</div>
    <div class="tile-row" id="m-tone-row"></div>
    <div class="spacer-row"></div>
    <div class="match-row-label">พยัญชนะ</div>
    <div class="tile-row" id="m-con-row"></div>
    <div class="spacer-row"></div>
    <div class="match-row-label">สระ</div>
    <div class="tile-row" id="m-vow-row"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════
let _currentAudio = null;
function speakThai(text, btnId, rate) {
  const btn = document.getElementById(btnId || 'q-speaker-btn');
  if (btn) btn.classList.add('playing');
  const done = () => { if (btn) btn.classList.remove('playing'); };

  // Stop any playing audio
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();

  // Google Translate TTS (natural human-like voice)
  const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=th&client=gtx&q=${encodeURIComponent(text)}`;
  const audio = new Audio(url);
  _currentAudio = audio;
  audio.onended  = done;
  audio.onerror  = () => {
    // Fallback: ResponsiveVoice → Web Speech API
    if (window.responsiveVoice && responsiveVoice.voiceSupport()) {
      responsiveVoice.speak(text, 'Thai Female', { rate: rate || 0.85, onend: done, onerror: done });
    } else if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'th-TH'; u.rate = rate || 0.85;
      u.onend = done; u.onerror = done;
      speechSynthesis.speak(u);
    } else { done(); }
  };
  audio.play().catch(() => audio.onerror());
}

// ══════════════════════════════════════════
//  LANGUAGE
// ══════════════════════════════════════════
const L = {
  subtitle: 'ฟังเสียง แล้วเลือกวรรณยุกต์ พยัญชนะ สระ!',
  score: (c,t) => `ถูก ${c} / ${t}`,
  correct: ['ถูกต้อง! 🎉','เก่งมาก! ✨','ยอดเยี่ยม! 🌟','เก่งจริงๆ! 🏆'],
  wrong:   ['ลองใหม่! 💪','ใกล้แล้ว! 😊','ยังไม่ถูก! 🌈'],
  streakSuper: n => `🔥 ต่อเนื่อง ${n} ครั้ง! 👑`,
  streakGood:  n => `⚡ ต่อเนื่อง ${n} ครั้ง! 🌟`,
};

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
// CONSONANTS: [char, romanization, thai_name, class]
// class: 0=กลาง(mid), 1=สูง(high), 2=ต่ำ(low)
const CONSONANTS = [
  ['ก','k', 'ก ไก่',   0], ['ข','kh','ข ไข่',   1], ['ค','kh','ค ควาย', 2],
  ['จ','j', 'จ จาน',   0], ['ช','ch','ช ช้าง',  2], ['ด','d', 'ด เด็ก', 0],
  ['ต','t', 'ต เต่า',  0], ['ถ','th','ถ ถุง',   1], ['ท','th','ท ทหาร', 2],
  ['น','n', 'น หนู',   2], ['บ','b', 'บ ใบไม้', 0], ['ป','p', 'ป ปลา',  0],
  ['ผ','ph','ผ ผึ้ง',  1], ['พ','ph','พ พาน',   2], ['ม','m', 'ม ม้า',  2],
  ['ร','r', 'ร เรือ',  2], ['ล','l', 'ล ลิง',  2], ['ว','w', 'ว แหวน', 2],
  ['ส','s', 'ส เสือ',  1], ['ห','h', 'ห หีบ',  1], ['อ','–', 'อ อ่าง', 0],
];

// vowFn(c, t): c=consonant, t=tone mark
// Unicode rule: above-vowels (อิ อี) must come BEFORE tone mark
const VOWELS = [
  [(c,t)=>c+t+'า',       'สระ อา',  'ยาว a'],
  [(c,t)=>c+t+'ะ',       'สระ อะ',  'สั้น a'],
  [(c,t)=>c+'\u0E34'+t,  'สระ อิ',  'สั้น i'],   // ก + ิ + tone ✅
  [(c,t)=>c+'\u0E35'+t,  'สระ อี',  'ยาว i'],    // ก + ี + tone ✅
  [(c,t)=>c+t+'ุ',       'สระ อุ',  'สั้น u'],
  [(c,t)=>c+t+'ู',       'สระ อู',  'ยาว u'],
  [(c,t)=>'เ'+c+t,       'สระ เอ',  'ee'],
  [(c,t)=>'แ'+c+t,       'สระ แอ',  'ae'],
  [(c,t)=>'โ'+c+t,       'สระ โอ',  'oo'],
  [(c,t)=>c+t+'อ',       'สระ อ',   'สั้น o'],
  [(c,t)=>'เ'+c+t+'า',   'สระ เอา', 'ao'],
  [(c,t)=>'เ'+c+'\u0E35'+t+'ย', 'สระ เอีย', 'ia'], // เ + ก + ี + tone + ย ✅
];

// TONES: [mark, name, display_label]
const TONES = [
  ['',       'สามัญ', 'สามัญ'],
  ['\u0E48', 'เอก',   'เอก ่'],
  ['\u0E49', 'โท',    'โท ้'],
  ['\u0E4A', 'ตรี',   'ตรี ๊'],
  ['\u0E4B', 'จัตวา', 'จัตวา ๋'],
];

function makeSyl(conChar, toneChar, vowFn) { return vowFn(conChar, toneChar); }

// Valid tone INDICES for each consonant class
function validTonesFor(cls) {
  return cls === 0 ? [0,1,2,3,4] : [0,1,2]; // mid=all5, high/low=first3
}

// ══════════════════════════════════════════
//  SCORE
// ══════════════════════════════════════════
let streak = 0, totalQ = 0, totalC = 0;
function updateScoreUI() {
  document.getElementById('s-num').textContent = streak;
  document.getElementById('score-text').textContent = L.score(totalC, totalQ);
  const badge = document.getElementById('streak-badge');
  badge.classList.remove('bump'); void badge.offsetWidth; badge.classList.add('bump');
  badge.querySelector('.s-icon').textContent = streak >= 5 ? '🔥' : streak >= 3 ? '⚡' : '🏅';
}
function showBubble(msg) {
  const el = document.getElementById('subtitle');
  el.textContent = msg;
  setTimeout(() => { el.textContent = L.subtitle; }, 2200);
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ══════════════════════════════════════════
//  MODE
// ══════════════════════════════════════════
let currentMode = 'quiz';
function setMode(mode) {
  currentMode = mode;
  document.getElementById('quiz-mode').style.display  = mode === 'quiz'  ? 'flex' : 'none';
  document.getElementById('match-mode').style.display = mode === 'match' ? 'flex' : 'none';
  document.getElementById('tab-quiz').classList.toggle('active',  mode === 'quiz');
  document.getElementById('tab-match').classList.toggle('active', mode === 'match');
  newRound();
}

// ══════════════════════════════════════════
//  SHARED ROUND STATE
// ══════════════════════════════════════════
let curCon, curVow, curTone;
let curToneOpts = [], curConOpts = [], curVowOpts = [];
let selTone = null, selCon = null, selVow = null;
let roundAnswered = false;

function newRound() {
  roundAnswered = false;
  selTone = null; selCon = null; selVow = null;

  // Pick consonant (class determines valid tones)
  const ci = Math.floor(Math.random() * CONSONANTS.length);
  curCon = CONSONANTS[ci];

  // Pick valid tone for this consonant class
  const validT = validTonesFor(curCon[3]);
  const tiRaw  = validT[Math.floor(Math.random() * validT.length)];
  curTone = TONES[tiRaw];

  // Pick vowel
  const vi = Math.floor(Math.random() * VOWELS.length);
  curVow = VOWELS[vi];

  // Tone options: all valid tones for this class, shuffled
  curToneOpts = [...validT].sort(() => Math.random() - 0.5);

  // Consonant options: correct + 3 random (unique)
  const conPool = new Set([ci]);
  while (conPool.size < Math.min(4, CONSONANTS.length))
    conPool.add(Math.floor(Math.random() * CONSONANTS.length));
  curConOpts = [...conPool].sort(() => Math.random() - 0.5);

  // Vowel options: correct + 3 random (unique)
  const vowPool = new Set([vi]);
  while (vowPool.size < 4)
    vowPool.add(Math.floor(Math.random() * VOWELS.length));
  curVowOpts = [...vowPool].sort(() => Math.random() - 0.5);

  if (currentMode === 'quiz')  renderQuiz();
  else                         renderMatch();

  setTimeout(() => speakCurrent(currentMode === 'quiz' ? 'q-speaker-btn' : 'm-speaker-btn'), 500);
}

function speakCurrent(btnId) {
  speakThai(makeSyl(curCon[0], curTone[0], curVow[0]), btnId);
}

// ══════════════════════════════════════════
//  ANSWER CHECK (shared)
// ══════════════════════════════════════════
function checkAnswer() {
  if (roundAnswered || selTone === null || selCon === null || selVow === null) return;
  roundAnswered = true;

  const chosenTone = TONES[curToneOpts[selTone]];
  const chosenCon  = CONSONANTS[curConOpts[selCon]];
  const chosenVow  = VOWELS[curVowOpts[selVow]];

  const toneOK = chosenTone === curTone;
  const conOK  = chosenCon  === curCon;
  const vowOK  = chosenVow  === curVow;
  const allOK  = toneOK && conOK && vowOK;

  totalQ++;

  if (allOK) {
    totalC++; streak++;
    if      (streak >= 5 && streak % 5 === 0) { launchConfetti(50); showBadge('🏆'); showBubble(L.streakSuper(streak)); }
    else if (streak >= 3 && streak % 3 === 0) { launchConfetti(28); showBadge('🎊'); showBubble(L.streakGood(streak)); }
    else                                       { launchConfetti(14); showBadge('✅'); showBubble(pick(L.correct)); }
  } else {
    streak = 0;
    showBadge('❌'); showBubble(pick(L.wrong));
  }
  updateScoreUI();

  if (currentMode === 'quiz') {
    highlightQuizResult(toneOK, conOK, vowOK, allOK);
    if (!allOK) showHint();
    else setTimeout(newRound, 1200);
  } else {
    highlightMatchResult(toneOK, conOK, vowOK, allOK);
    if (allOK) {
      document.getElementById('m-audio-syllable').textContent = makeSyl(curCon[0], curTone[0], curVow[0]);
      setTimeout(newRound, 1200);
    } else {
      setTimeout(() => {
        roundAnswered = false;
        selTone = null; selCon = null; selVow = null;
        clearMatchLines();
        renderMatch();
        setTimeout(() => speakCurrent('m-speaker-btn'), 300);
      }, 1400);
    }
  }
}

// ══════════════════════════════════════════
//  QUIZ MODE
// ══════════════════════════════════════════
function renderQuiz() {
  document.getElementById('hint-box').classList.remove('show');

  // ── Tone row ──
  const toneRow = document.getElementById('q-tone-row');
  toneRow.innerHTML = '';
  curToneOpts.forEach((tIdx, pos) => {
    const t = TONES[tIdx];
    const example = curCon[0] + t[0] + 'า'; // show with อา for context
    const btn = document.createElement('button');
    btn.className = 'sel-btn';
    btn.id = 'q-t-' + pos;
    btn.innerHTML = `<span class="sel-char">${example}</span><span class="sel-name">${t[1]}</span>`;
    btn.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('#q-tone-row .sel-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selTone = pos;
      checkAnswer();
    });
    toneRow.appendChild(btn);
  });

  // ── Consonant row ──
  const conRow = document.getElementById('q-con-row');
  conRow.innerHTML = '';
  curConOpts.forEach((cIdx, pos) => {
    const c = CONSONANTS[cIdx];
    const btn = document.createElement('button');
    btn.className = 'sel-btn';
    btn.id = 'q-c-' + pos;
    btn.innerHTML = `<span class="sel-char">${c[0]}</span><span class="sel-name">${c[2].split(' ')[0]}</span>`;
    btn.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('#q-con-row .sel-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selCon = pos;
      checkAnswer();
    });
    conRow.appendChild(btn);
  });

  // ── Vowel row ──
  const vowRow = document.getElementById('q-vow-row');
  vowRow.innerHTML = '';
  curVowOpts.forEach((vIdx, pos) => {
    const v = VOWELS[vIdx];
    const form = v[0]('อ', '');
    const btn = document.createElement('button');
    btn.className = 'sel-btn';
    btn.id = 'q-v-' + pos;
    btn.innerHTML = `<span class="sel-char">${form}</span><span class="sel-name">${v[1]}</span>`;
    btn.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('#q-vow-row .sel-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selVow = pos;
      checkAnswer();
    });
    vowRow.appendChild(btn);
  });
}

function highlightQuizResult(toneOK, conOK, vowOK, allOK) {
  const tBtn = document.querySelectorAll('#q-tone-row .sel-btn')[selTone];
  const cBtn = document.querySelectorAll('#q-con-row .sel-btn')[selCon];
  const vBtn = document.querySelectorAll('#q-vow-row .sel-btn')[selVow];
  if (tBtn) tBtn.classList.add(toneOK ? 'correct-ans' : 'wrong-ans');
  if (cBtn) cBtn.classList.add(conOK  ? 'correct-ans' : 'wrong-ans');
  if (vBtn) vBtn.classList.add(vowOK  ? 'correct-ans' : 'wrong-ans');

  if (!allOK) {
    // Reveal correct answers
    const correctToneIdx = TONES.indexOf(curTone);
    const correctConIdx  = CONSONANTS.indexOf(curCon);
    const correctVowIdx  = VOWELS.indexOf(curVow);
    document.querySelectorAll('#q-tone-row .sel-btn').forEach((b, i) => {
      if (curToneOpts[i] === correctToneIdx) b.classList.add('correct-ans');
    });
    document.querySelectorAll('#q-con-row .sel-btn').forEach((b, i) => {
      if (curConOpts[i] === correctConIdx) b.classList.add('correct-ans');
    });
    document.querySelectorAll('#q-vow-row .sel-btn').forEach((b, i) => {
      if (curVowOpts[i] === correctVowIdx) b.classList.add('correct-ans');
    });
  }
}

function showHint() {
  const correct = makeSyl(curCon[0], curTone[0], curVow[0]);
  document.getElementById('hint-content').innerHTML =
    `${curCon[0]} + ${curTone[1]} + ${curVow[1]}<br>= <b>${correct}</b>`;
  document.getElementById('hint-box').classList.add('show');
  setTimeout(newRound, 2500);
}

// ══════════════════════════════════════════
//  MATCH MODE
// ══════════════════════════════════════════
function renderMatch() {
  clearMatchLines();
  document.getElementById('m-audio-syllable').textContent = '???';

  const toneRow = document.getElementById('m-tone-row');
  const conRow  = document.getElementById('m-con-row');
  const vowRow  = document.getElementById('m-vow-row');
  toneRow.innerHTML = ''; conRow.innerHTML = ''; vowRow.innerHTML = '';

  // Tone tiles
  curToneOpts.forEach((tIdx, pos) => {
    const t = TONES[tIdx];
    const example = curCon[0] + t[0] + 'า';
    const tile = makeTile('tone-tile', 'm-t-' + pos, example, t[1]);
    tile.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('.tone-tile').forEach(x => x.classList.remove('selected'));
      tile.classList.add('selected');
      selTone = pos;
      drawMatchLines();
      if (selCon !== null && selVow !== null) checkAnswer();
    });
    toneRow.appendChild(tile);
  });

  // Consonant tiles
  curConOpts.forEach((cIdx, pos) => {
    const c = CONSONANTS[cIdx];
    const tile = makeTile('con-tile', 'm-c-' + pos, c[0], c[2].split(' ')[0]);
    tile.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('.con-tile').forEach(x => x.classList.remove('selected'));
      tile.classList.add('selected');
      selCon = pos;
      drawMatchLines();
      if (selTone !== null && selVow !== null) checkAnswer();
    });
    conRow.appendChild(tile);
  });

  // Vowel tiles
  curVowOpts.forEach((vIdx, pos) => {
    const v = VOWELS[vIdx];
    const tile = makeTile('vow-tile', 'm-v-' + pos, v[0]('อ', ''), v[1]);
    tile.addEventListener('click', () => {
      if (roundAnswered) return;
      document.querySelectorAll('.vow-tile').forEach(x => x.classList.remove('selected'));
      tile.classList.add('selected');
      selVow = pos;
      drawMatchLines();
      if (selTone !== null && selCon !== null) checkAnswer();
    });
    vowRow.appendChild(tile);
  });
}

function makeTile(cls, id, char, sub) {
  const tile = document.createElement('div');
  tile.className = 'tile ' + cls;
  tile.id = id;
  tile.innerHTML = `<span>${char}</span><div class="tile-sub">${sub}</div>`;
  return tile;
}

function highlightMatchResult(toneOK, conOK, vowOK, allOK) {
  if (selTone !== null) document.getElementById('m-t-' + selTone)?.classList.add(toneOK ? 'correct-tile' : 'wrong-tile');
  if (selCon  !== null) document.getElementById('m-c-' + selCon )?.classList.add(conOK  ? 'correct-tile' : 'wrong-tile');
  if (selVow  !== null) document.getElementById('m-v-' + selVow )?.classList.add(vowOK  ? 'correct-tile' : 'wrong-tile');
}

function drawMatchLines() {
  clearMatchLines();
  const svg   = document.getElementById('match-svg');
  const arena = document.getElementById('match-arena');
  const aRect = arena.getBoundingClientRect();

  function center(el) {
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      x:   r.left + r.width / 2 - aRect.left,
      top: r.top              - aRect.top,
      bot: r.top + r.height   - aRect.top,
    };
  }

  function drawLine(x1, y1, x2, y2, color) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '3.5');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('opacity', '0.75');
    const len = Math.hypot(x2 - x1, y2 - y1);
    line.setAttribute('stroke-dasharray', len);
    line.setAttribute('stroke-dashoffset', len);
    line.style.animation = 'drawLine 0.3s ease forwards';
    svg.appendChild(line);
  }

  // tone → con line
  if (selTone !== null && selCon !== null) {
    const t = center(document.getElementById('m-t-' + selTone));
    const c = center(document.getElementById('m-c-' + selCon));
    if (t && c) drawLine(t.x, t.bot, c.x, c.top, '#FF8C00');
  }
  // con → vow line
  if (selCon !== null && selVow !== null) {
    const c = center(document.getElementById('m-c-' + selCon));
    const v = center(document.getElementById('m-v-' + selVow));
    if (c && v) drawLine(c.x, c.bot, v.x, v.top, '#9B59B6');
  }
}

function clearMatchLines() {
  document.getElementById('match-svg').innerHTML = '';
}

// ══════════════════════════════════════════
//  CONFETTI & BADGE
// ══════════════════════════════════════════
function launchConfetti(n) {
  const layer = document.getElementById('cf-layer');
  layer.innerHTML = '';
  const em = ['🌟','⭐','🎉','🎊','✨','🌈','💫','🎈','🎀','🍭'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf'; el.textContent = pick(em);
      el.style.left = (Math.random() * 105 - 5) + 'vw';
      el.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
      const dur = 1.6 + Math.random() * 2.2;
      el.style.animation = `cfFall ${dur}s linear forwards`;
      layer.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 100);
    }, Math.random() * 500);
  }
}
function showBadge(e) {
  const el = document.getElementById('big-badge');
  el.textContent = e; el.className = 'show';
  setTimeout(() => { el.className = 'hide'; }, 600);
}

// ══ SVG animation keyframe ══
const svgStyle = document.createElement('style');
svgStyle.textContent = `@keyframes drawLine { to { stroke-dashoffset: 0; } }`;
document.head.appendChild(svgStyle);

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updateScoreUI();
newRound();
</script>
