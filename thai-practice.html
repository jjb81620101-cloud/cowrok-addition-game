<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 泰文聽力練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #FF6B9D; --purple: #9B59B6; --blue: #3D5AF1;
    --green: #00C853; --gold: #FFD700;
  }
  body {
    font-family: 'Microsoft JhengHei','微軟正黑體','PingFang TC',sans-serif;
    background: linear-gradient(160deg,#FFF0F5 0%,#E8F4FF 40%,#F5FFF0 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 12px 40px;
  }

  /* ── Lang toggle ── */
  #lang-btn {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    background: #fff; border: 2px solid #ddd; border-radius: 50px;
    padding: 6px 14px; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    font-family: inherit; color: #444;
  }

  /* ── Header ── */
  .title-area { text-align: center; margin-bottom: 20px; }
  .title-area h1 {
    font-size: clamp(1.6rem,5vw,2.4rem); font-weight: 900;
    color: var(--pink); text-shadow: 3px 3px 0 #FFB3D1;
    animation: wiggle 3s ease-in-out infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
  .subtitle { font-size: 0.9rem; color: var(--purple); font-weight: 700; margin-top: 4px; }

  /* ── Score bar ── */
  .top-bar {
    display: flex; gap: 10px; margin-bottom: 24px;
    flex-wrap: wrap; justify-content: center;
  }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg,#FFD700,#FF8C00);
    border-radius: 50px; padding: 8px 18px;
    box-shadow: 0 4px 14px rgba(255,165,0,0.4);
    border: 3px solid rgba(255,255,255,0.6);
  }
  .streak-badge.bump { animation: bump 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18) rotate(-3deg)} }
  .s-icon { font-size: 1.4rem; }
  .s-label,.s-suffix { font-size: 0.9rem; font-weight: 900; color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.25); }
  .s-num { font-size: 1.8rem; font-weight: 900; color:#fff; min-width:36px; text-align:center; }
  .score-badge {
    display: flex; align-items: center;
    background: linear-gradient(135deg,#A78BFA,#7C3AED);
    border-radius: 50px; padding: 8px 18px;
    box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .score-text { font-size: 0.95rem; font-weight: 900; color:#fff; }

  /* ── Speaker Card ── */
  .speaker-card {
    background: #fff; border-radius: 28px;
    padding: 32px 40px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    border: 4px solid #E8D5FF;
    margin-bottom: 24px; text-align: center;
    width: 100%; max-width: 380px;
    animation: slideIn 0.38s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes slideIn { 0%{transform:translateY(-18px) scale(0.95);opacity:0} 100%{transform:none;opacity:1} }

  .q-label { font-size: 0.82rem; color: #bbb; font-weight: 700; margin-bottom: 18px; letter-spacing: 1px; }

  .speaker-btn {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg,#A78BFA,#7C3AED);
    border: none; cursor: pointer; font-size: 3.5rem;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4), 0 0 0 0 rgba(124,58,237,0.3);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .speaker-btn:active { transform: scale(0.92); }
  .speaker-btn.playing {
    animation: speakPulse 0.7s ease infinite alternate, ripple 1s ease infinite;
  }
  @keyframes speakPulse { from{transform:scale(1)} to{transform:scale(1.1)} }
  @keyframes ripple {
    0%   { box-shadow: 0 8px 24px rgba(124,58,237,0.4), 0 0 0 0   rgba(124,58,237,0.4); }
    100% { box-shadow: 0 8px 24px rgba(124,58,237,0.4), 0 0 0 28px rgba(124,58,237,0); }
  }
  .replay-label { font-size: 0.82rem; color: #aaa; font-weight: 700; }

  /* ── Answer Grid ── */
  .answers-label { font-size: 0.9rem; color: #888; font-weight: 700; margin-bottom: 10px; text-align: center; }
  .ans-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; max-width: 380px; width: 100%; margin-bottom: 20px;
  }
  .ans-btn {
    border: none; border-radius: 18px; padding: 18px 10px;
    font-size: clamp(2rem,7vw,2.8rem); font-weight: 900;
    cursor: pointer; font-family: inherit; color: #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ans-btn:not(:disabled):hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 9px 0 rgba(0,0,0,0.2); }
  .ans-btn:not(:disabled):active { transform: scale(0.93); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
  .ans-btn:nth-child(1) { background: linear-gradient(135deg,#FF6B9D,#FF4757); }
  .ans-btn:nth-child(2) { background: linear-gradient(135deg,#3D5AF1,#1A3AE0); }
  .ans-btn:nth-child(3) { background: linear-gradient(135deg,#FF8C00,#E65100); }
  .ans-btn:nth-child(4) { background: linear-gradient(135deg,#00C853,#1B5E20); }
  .ans-btn.correct { background: linear-gradient(135deg,#00E676,#00C853) !important; animation: btnOK 0.45s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes btnOK { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25) rotate(-4deg)} }
  .ans-btn.wrong { background: linear-gradient(135deg,#FF5252,#B71C1C) !important; animation: btnNG 0.4s ease; }
  @keyframes btnNG { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* ── Reveal label ── */
  .reveal-label {
    font-size: 0.9rem; color: #888; text-align: center;
    margin-bottom: 12px; min-height: 22px; font-weight: 600;
  }
  .reveal-label span { color: var(--purple); font-weight: 900; font-size: 1.1rem; }

  /* ── Next btn ── */
  #next-btn {
    display: none; background: linear-gradient(135deg,#FF6B9D,#FF4757);
    color: #fff; border: none; border-radius: 50px;
    padding: 14px 44px; font-size: clamp(1rem,3vw,1.3rem);
    font-weight: 900; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 0 #B71C55, 0 10px 24px rgba(255,71,87,0.35);
    margin-bottom: 16px; letter-spacing: 2px;
    transition: transform 0.15s;
  }
  #next-btn.vis { display: inline-block; animation: nextIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes nextIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 100%{transform:scale(1);opacity:1} }
  #next-btn:hover { transform: translateY(-3px) scale(1.05); }

  /* ── Hint panel ── */
  .hint-box {
    max-width: 380px; width: 100%;
    background: #fff; border-radius: 18px;
    padding: 14px 18px; margin-bottom: 14px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.07);
    border-left: 5px solid var(--purple);
    display: none;
  }
  .hint-box.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .hint-title { font-size: 0.78rem; color: var(--purple); font-weight: 700; margin-bottom: 6px; }
  .hint-row { font-size: 1rem; color: #555; line-height: 2; }
  .hint-row b { font-size: 1.4rem; color: var(--blue); }

  /* ── Confetti ── */
  #cf-layer { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden; }
  .cf { position:absolute;top:-30px;font-size:1.3rem;animation:cfFall linear forwards; }
  @keyframes cfFall { 0%{opacity:1;transform:translateY(0) rotate(0)} 80%{opacity:1} 100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(0.4)} }
  #big-badge { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:7rem;pointer-events:none;z-index:9998;transition:transform 0.22s cubic-bezier(0.175,0.885,0.32,1.275); }
  #big-badge.show { transform:translate(-50%,-50%) scale(1); }
  #big-badge.hide { transform:translate(-50%,-50%) scale(0);transition:transform 0.16s ease-in; }

  @media(max-width:380px) {
    .ans-btn { font-size: 1.8rem; padding: 14px 6px; }
    .speaker-btn { width: 90px; height: 90px; font-size: 2.8rem; }
  }
</style>
</head>
<body>

<div id="cf-layer"></div>
<div id="big-badge"></div>

<button id="lang-btn" onclick="toggleLang()">🇹🇭 ภาษาไทย</button>

<div class="title-area">
  <h1 id="title-h1">🇹🇭 泰文聽力練習</h1>
  <div class="subtitle" id="subtitle">聽聲音，選正確的泰文字！</div>
</div>

<div class="top-bar">
  <div class="streak-badge" id="streak-badge">
    <span class="s-icon">🏅</span>
    <span class="s-label" id="s-label">連勝</span>
    <span class="s-num" id="s-num">0</span>
    <span class="s-suffix" id="s-suffix">次</span>
  </div>
  <div class="score-badge">
    <span class="score-text" id="score-text">答對 0 / 0</span>
  </div>
</div>

<div class="speaker-card" id="speaker-card">
  <div class="q-label" id="q-label">聽聲音，選正確的泰文音節</div>
  <button class="speaker-btn" id="speaker-btn" onclick="speakSyllable()">🔊</button>
  <div class="replay-label" id="replay-label">點擊重播</div>
</div>

<div class="answers-label" id="answers-label">👇 選擇正確的泰文字</div>
<div class="ans-grid" id="ans-grid"></div>

<div class="reveal-label" id="reveal-label"></div>

<button id="next-btn" onclick="nextQ()">✨ 下一題 ➡️</button>

<div class="hint-box" id="hint-box">
  <div class="hint-title" id="hint-title">💡 提示</div>
  <div class="hint-row" id="hint-content"></div>
</div>

<script>
// ── Speech ──────────────────────────────────────────────────
function speakThai(text, rate) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'th-TH';
  utter.rate = rate || 0.85;
  utter.pitch = 1;
  const btn = document.getElementById('speaker-btn');
  btn.classList.add('playing');
  utter.onend = () => btn.classList.remove('playing');
  utter.onerror = () => btn.classList.remove('playing');
  speechSynthesis.speak(utter);
}
function speakSyllable() { speakThai(curVow[0](curCon[0])); }

// ── Language ──────────────────────────────────────────────────
const L = {
  zh: {
    title: '🇹🇭 泰文聽力練習',
    subtitle: '聽聲音，選正確的泰文字！',
    streakLabel: '連勝', streakSuffix: '次',
    score: (c,t) => `答對 ${c} / ${t}`,
    qLabel: '聽聲音，選正確的泰文音節',
    ansLabel: '👇 選擇正確的泰文字',
    replayLabel: '點擊重播',
    nextBtn: '✨ 下一題 ➡️',
    hintTitle: '💡 提示',
    langBtn: '🇹🇭 ภาษาไทย',
    revealCorrect: s => `✅ 正確答案是：<span>${s}</span>`,
    correct: ['答對了！🎉','完全正確！✨','太棒了！🌟','好厲害！🏆','完美！🎊','繼續加油！💪'],
    wrong:   ['再試試看！💪','很接近了！😊','不對喔，繼續！🌈','加油！再想想！✨'],
    streakSuper: n => `🔥 連勝 ${n} 次！泰文達人！👑`,
    streakGood:  n => `⚡ 連勝 ${n} 次！好厲害！🌟`,
  },
  th: {
    title: '🇹🇭 ฝึกฟังภาษาไทย',
    subtitle: 'ฟังเสียง แล้วเลือกพยางค์ที่ถูกต้อง!',
    streakLabel: 'ต่อเนื่อง', streakSuffix: 'ครั้ง',
    score: (c,t) => `ถูก ${c} / ${t}`,
    qLabel: 'ฟังเสียง แล้วเลือกพยางค์',
    ansLabel: '👇 เลือกพยางค์ภาษาไทย',
    replayLabel: 'แตะเพื่อเล่นซ้ำ',
    nextBtn: '✨ ต่อไป ➡️',
    hintTitle: '💡 คำใบ้',
    langBtn: '🇹🇼 繁體中文',
    revealCorrect: s => `✅ คำตอบที่ถูกต้องคือ：<span>${s}</span>`,
    correct: ['ถูกต้อง! 🎉','เก่งมาก! ✨','ยอดเยี่ยม! 🌟','เก่งจริงๆ! 🏆'],
    wrong:   ['ลองใหม่! 💪','ใกล้แล้ว! 😊','ยังไม่ถูก ลองต่อ! 🌈'],
    streakSuper: n => `🔥 ต่อเนื่อง ${n} ครั้ง! เก่งมาก! 👑`,
    streakGood:  n => `⚡ ต่อเนื่อง ${n} ครั้ง! 🌟`,
  }
};
let lang = 'zh';
function toggleLang() { lang = lang === 'zh' ? 'th' : 'zh'; applyLang(); updateUI(); }
function applyLang() {
  const l = L[lang];
  document.getElementById('title-h1').textContent = l.title;
  document.getElementById('subtitle').textContent = l.subtitle;
  document.getElementById('s-label').textContent = l.streakLabel;
  document.getElementById('s-suffix').textContent = l.streakSuffix;
  document.getElementById('q-label').textContent = l.qLabel;
  document.getElementById('answers-label').textContent = l.ansLabel;
  document.getElementById('replay-label').textContent = l.replayLabel;
  document.getElementById('next-btn').textContent = l.nextBtn;
  document.getElementById('hint-title').textContent = l.hintTitle;
  document.getElementById('lang-btn').textContent = l.langBtn;
}

// ── Data ──────────────────────────────────────────────────────
const CONSONANTS = [
  ['ก','k','mid','ก ไก่','發音類似 k，不送氣'],
  ['ข','kh','high','ข ไข่','發音類似 k，送氣'],
  ['ค','kh','low','ค ควาย','發音類似 k，送氣'],
  ['จ','j','mid','จ จาน','發音類似 j'],
  ['ช','ch','low','ช ช้าง','發音類似 ch'],
  ['ด','d','mid','ด เด็ก','發音類似 d'],
  ['ต','t','mid','ต เต่า','發音類似 t，不送氣'],
  ['ถ','th','high','ถ ถุง','發音類似 t，送氣'],
  ['ท','th','low','ท ทหาร','發音類似 t，送氣'],
  ['น','n','low','น หนู','發音類似 n'],
  ['บ','b','mid','บ ใบไม้','發音類似 b'],
  ['ป','p','mid','ป ปลา','發音類似 p，不送氣'],
  ['ผ','ph','high','ผ ผึ้ง','發音類似 p，送氣'],
  ['พ','ph','low','พ พาน','發音類似 p，送氣'],
  ['ม','m','low','ม ม้า','發音類似 m'],
  ['ร','r','low','ร เรือ','發音類似 r'],
  ['ล','l','low','ล ลิง','發音類似 l'],
  ['ว','w','low','ว แหวน','發音類似 w'],
  ['ส','s','high','ส เสือ','發音類似 s'],
  ['ห','h','high','ห หีบ','發音類似 h'],
  ['อ','–','mid','อ อ่าง','聲門塞音'],
];
const VOWELS = [
  [c => c + 'า',        'aa',  'สระ อา',   '長 a 音，如「啊～」'],
  [c => c + 'ะ',        'a',   'สระ อะ',   '短 a 音'],
  [c => c + 'ิ',        'i',   'สระ อิ',   '短 i 音，如「衣」'],
  [c => c + 'ี',        'ii',  'สระ อี',   '長 i 音，如「伊～」'],
  [c => c + 'ุ',        'u',   'สระ อุ',   '短 u 音，如「污」'],
  [c => c + 'ู',        'uu',  'สระ อู',   '長 u 音，如「屋～」'],
  [c => 'เ' + c,        'ee',  'สระ เอ',   '類似英文 say 的 ay'],
  [c => 'แ' + c,        'ae',  'สระ แอ',   '類似英文 cat 的 a'],
  [c => 'โ' + c,        'oo',  'สระ โอ',   '類似英文 go 的 o'],
  [c => c + 'อ',        'o',   'สระ อ',    '短 o 音'],
  [c => 'เ' + c + 'า',  'ao',  'สระ เอา',  '複合母音，如「澳」'],
  [c => 'เ' + c + 'ีย', 'ia',  'สระ เอีย', '複合母音 ia'],
];

// ── Game state ──────────────────────────────────────────────
let streak = 0, totalQ = 0, totalC = 0;
let curCon, curVow, answered;

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function newQ() {
  answered = false;
  document.getElementById('reveal-label').innerHTML = '';
  document.getElementById('hint-box').classList.remove('show');
  document.getElementById('next-btn').className = '';

  curCon = pickRandom(CONSONANTS);
  curVow = pickRandom(VOWELS);

  // Animate card
  const card = document.getElementById('speaker-card');
  card.style.animation = 'none'; void card.offsetWidth;
  card.style.animation = 'slideIn 0.38s cubic-bezier(0.175,0.885,0.32,1.275)';

  buildAnswers();

  // Auto-play after short delay
  setTimeout(speakSyllable, 500);
}

function buildAnswers() {
  const correct = curVow[0](curCon[0]);
  const pool = new Set([correct]);

  let attempts = 0;
  while (pool.size < 4 && attempts < 300) {
    attempts++;
    const wc = pickRandom(CONSONANTS);
    const wv = pickRandom(VOWELS);
    const w = wv[0](wc[0]);
    if (w !== correct) pool.add(w);
  }

  const opts = [...pool].sort(() => Math.random() - 0.5).slice(0, 4);
  if (!opts.includes(correct)) opts[Math.floor(Math.random() * 4)] = correct;

  const grid = document.getElementById('ans-grid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      speakThai(opt, 0.9);
      onAnswer(opt, btn);
    });
    grid.appendChild(btn);
  });
}

function onAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  totalQ++;
  const correct = curVow[0](curCon[0]);
  const l = L[lang];

  if (chosen === correct) {
    totalC++; streak++;
    btn.classList.add('correct');
    document.querySelectorAll('.ans-btn').forEach(b => { if (b !== btn) { b.disabled = true; b.style.opacity = '0.35'; } });
    if (streak >= 5 && streak % 5 === 0) {
      launchConfetti(50); showBadge('🏆');
      showBubble(l.streakSuper(streak));
    } else if (streak >= 3 && streak % 3 === 0) {
      launchConfetti(28); showBadge('🎊');
      showBubble(l.streakGood(streak));
    } else {
      launchConfetti(14); showBadge('✅');
      showBubble(pickRandom(l.correct));
    }
  } else {
    streak = 0;
    btn.classList.add('wrong');
    btn.disabled = true; btn.style.opacity = '0.4';
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
    showBadge('❌');
    showBubble(pickRandom(l.wrong));
    // Show reveal label + hint
    document.getElementById('reveal-label').innerHTML = l.revealCorrect(correct);
    showHint();
  }

  updateUI();
  setTimeout(() => { document.getElementById('next-btn').className = 'vis'; }, 700);
}

function showHint() {
  const l = L[lang];
  const isZh = lang === 'zh';
  document.getElementById('hint-content').innerHTML =
    `${curCon[0]} <small style="color:#aaa">(${curCon[3]})</small><br>` +
    `+ ${curVow[2]}${isZh ? '：' + curVow[3] : ''}<br>` +
    `= <b>${curVow[0](curCon[0])}</b>`;
  document.getElementById('hint-box').classList.add('show');
}

function updateUI() {
  const l = L[lang];
  document.getElementById('s-num').textContent = streak;
  document.getElementById('score-text').textContent = l.score(totalC, totalQ);
  const badge = document.getElementById('streak-badge');
  badge.classList.remove('bump'); void badge.offsetWidth; badge.classList.add('bump');
  badge.querySelector('.s-icon').textContent = streak >= 5 ? '🔥' : streak >= 3 ? '⚡' : '🏅';
}

function nextQ() { newQ(); }

function showBubble(msg) {
  const el = document.getElementById('subtitle');
  el.textContent = msg;
  setTimeout(() => { el.textContent = L[lang].subtitle; }, 2200);
}

function launchConfetti(n) {
  const layer = document.getElementById('cf-layer');
  layer.innerHTML = '';
  const em = ['🌟','⭐','🎉','🎊','✨','🌈','💫','🎈','🎀','🍭'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf';
      el.textContent = em[Math.floor(Math.random() * em.length)];
      el.style.left = (Math.random() * 105 - 5) + 'vw';
      el.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
      const dur = 1.6 + Math.random() * 2.2;
      el.style.animation = `cfFall ${dur}s linear forwards`;
      layer.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 100);
    }, Math.random() * 500);
  }
}
function showBadge(e) {
  const el = document.getElementById('big-badge');
  el.textContent = e; el.className = 'show';
  setTimeout(() => { el.className = 'hide'; }, 600);
}

// Init
applyLang();
newQ();
</script>
