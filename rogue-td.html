<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏰 肉鴿塔防</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1b0d;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Microsoft JhengHei',sans-serif;color:#fff;overflow:hidden}
#hud{display:flex;gap:12px;padding:7px 12px;background:rgba(0,0,0,0.6);width:100%;justify-content:center;flex-wrap:wrap;border-bottom:2px solid #2d6a2d}
.hi{display:flex;align-items:center;gap:4px;font-size:.9rem;font-weight:700}
.hv{color:#FFD700;font-size:1rem}
#wave-btn{background:linear-gradient(135deg,#5a2d8a,#3a1a5a);border:none;border-radius:50px;padding:5px 16px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:.85rem}
#wave-btn:disabled{opacity:.4;cursor:not-allowed}
#canvas-wrap{position:relative}
canvas{display:block;cursor:crosshair;touch-action:none}
#tbar{display:flex;gap:6px;padding:7px;background:rgba(0,0,0,0.7);width:100%;justify-content:center;flex-wrap:wrap;border-top:2px solid #2d6a2d}
.tbtn{border:2px solid #444;border-radius:10px;padding:5px 10px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;transition:all .15s;text-align:center;min-width:72px}
.tbtn:hover{border-color:#FFD700}
.tbtn.sel{border-color:#FFD700;background:rgba(255,215,0,.15);box-shadow:0 0 8px #FFD700}
.tbtn .tc{color:#FFD700;font-size:.7rem}
.tbtn.na{opacity:.35;cursor:not-allowed}
#uov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;overflow-y:auto;padding:16px 8px}
#uov.show{display:flex}
#utitle{font-size:1.5rem;font-weight:900;color:#FFD700;text-shadow:0 0 20px #FFD700}
#ucards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.ucard{border-radius:16px;padding:16px 18px;min-width:145px;max-width:175px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.ucard:hover{transform:translateY(-5px)}
/* Rarity styles */
.rc{background:linear-gradient(135deg,#2a2a2a,#1a1a1a);border:2px solid #888}
.rc:hover{box-shadow:0 8px 20px rgba(150,150,150,.4);border-color:#ccc}
.rr{background:linear-gradient(135deg,#0d2a4a,#071a2e);border:2px solid #2196F3}
.rr:hover{box-shadow:0 8px 20px rgba(33,150,243,.5);border-color:#64B5F6}
.re{background:linear-gradient(135deg,#2a0d4a,#1a072e);border:2px solid #9C27B0}
.re:hover{box-shadow:0 8px 24px rgba(156,39,176,.6);border-color:#CE93D8}
.rl{background:linear-gradient(135deg,#4a3500,#2e2000);border:2px solid #FFD700;animation:lglow 2s ease-in-out infinite}
.rl:hover{box-shadow:0 8px 28px rgba(255,215,0,.7);border-color:#FFF176}
@keyframes lglow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.4)}50%{box-shadow:0 0 20px rgba(255,215,0,.8)}}
.rbadge{font-size:.65rem;font-weight:900;padding:2px 7px;border-radius:50px;display:inline-block;margin-bottom:6px}
.brc{background:#555;color:#ddd}
.brr{background:#1565C0;color:#90CAF9}
.bre{background:#6A1B9A;color:#E1BEE7}
.brl{background:#F57F17;color:#FFF9C4;animation:lglow 1.5s infinite}
.uico{font-size:2.2rem;margin-bottom:5px}
.unm{font-weight:900;font-size:.9rem;margin-bottom:4px}
.unm.cc{color:#ccc}.unm.cr{color:#90CAF9}.unm.ce{color:#E1BEE7}.unm.cl{color:#FFF176}
.udc{font-size:.72rem;color:#aaa;line-height:1.4}
#reroll-btn{background:linear-gradient(135deg,#3a3a3a,#222);border:2px solid #888;border-radius:50px;padding:8px 20px;color:#ccc;font-weight:700;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s}
#reroll-btn:hover:not(:disabled){border-color:#FFD700;color:#FFD700}
#reroll-btn:disabled{opacity:.4;cursor:not-allowed}
#skip-btn{background:transparent;border:1px solid #444;border-radius:50px;padding:6px 16px;color:#666;font-weight:700;cursor:pointer;font-family:inherit;font-size:.8rem}
/* Equipment card */
.req{background:linear-gradient(135deg,#3a2000,#2a1500);border:2px solid #FF9800}
.req:hover{box-shadow:0 8px 24px rgba(255,152,0,.55);border-color:#FFD54F}
.breq{background:#E65100;color:#FFE0B2}.unm.ceq{color:#FFD54F}
/* Save/load */
#savebar{display:flex;gap:8px;padding:4px 12px;background:rgba(0,0,0,.5);width:100%;justify-content:center;align-items:center;border-top:1px solid #1a3a1a}
.svbtn{border:1px solid #444;border-radius:20px;padding:4px 14px;background:rgba(255,255,255,.04);color:#aaa;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.svbtn:hover{border-color:#FFD700;color:#FFD700}
.svbtn.has-save{border-color:#4CAF50;color:#90EE90}
#save-indicator{font-size:.72rem;color:#666;transition:all .5s}
#save-indicator.flash{color:#4CAF50}
/* Hero select */
#hsov{display:flex;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#hs-title{font-size:1.6rem;font-weight:900;color:#FFD700;text-shadow:0 0 20px #FFD700}
#hs-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hcard{border-radius:16px;padding:16px 18px;min-width:140px;max-width:165px;cursor:pointer;transition:all .2s;text-align:center;background:linear-gradient(135deg,#1a2a1a,#0d1a0d);border:2px solid #4a8a4a}
.hcard:hover{transform:translateY(-5px);border-color:#FFD700;box-shadow:0 8px 24px rgba(255,215,0,.4)}
.hem{font-size:2.4rem;margin-bottom:6px}
.hnm{font-weight:900;font-size:1rem;color:#90EE90;margin-bottom:4px}
.hdc{font-size:.72rem;color:#aaa;line-height:1.4;margin-bottom:6px}
.habl{font-size:.68rem;color:#FFD700;background:rgba(255,215,0,.1);padding:3px 8px;border-radius:50px;display:inline-block}
/* Equipment row */
#eqrow{display:flex;gap:8px;padding:4px 12px;background:rgba(0,0,0,.55);width:100%;justify-content:center;align-items:center;flex-wrap:wrap;border-bottom:1px solid #1a3a1a}
.eqslot{border:1px solid #444;border-radius:8px;padding:3px 10px;font-size:.75rem;min-width:88px;text-align:center;background:rgba(255,255,255,.03);color:#888}
.eqslot.on{border-color:#FF9800;color:#FFD700}
/* Ability button */
#abtn{background:linear-gradient(135deg,#7a5500,#5a3d00);border:2px solid #FF9800;border-radius:50px;padding:5px 14px;color:#FFD700;font-weight:900;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .2s}
#abtn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(1)}
#abtn.rdy{animation:abglow 1.5s ease-in-out infinite}
@keyframes abglow{0%,100%{box-shadow:0 0 6px #FF9800}50%{box-shadow:0 0 18px #FFD700}}
#skip-btn:hover{color:#aaa;border-color:#666}
#gov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#gov.show{display:flex}
#gotitle{font-size:2.2rem;font-weight:900;color:#FF4444}
#gostats{color:#ccc;font-size:1rem;text-align:center;line-height:2}
#rebtn{background:linear-gradient(135deg,#7B2FBE,#4a1c6e);border:none;border-radius:50px;padding:12px 32px;color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;margin-top:6px}
</style>
</head>
<body>
<div id="hud">
  <div class="hi" id="hero-badge" style="color:#90EE90;font-weight:900"></div>
  <div class="hi">❤️<span class="hv" id="hl">20</span></div>
  <div class="hi">💰<span class="hv" id="hg">150</span></div>
  <div class="hi">🌊<span class="hv" id="hw">0</span></div>
  <div class="hi">⭐<span class="hv" id="hs">0</span></div>
  <div class="hi"><button id="abtn" disabled>⚡技能</button></div>
  <div class="hi"><button id="wave-btn">開始波次</button></div>
</div>
<div id="eqrow">
  <div class="eqslot" id="eq-weapon">⚔️ 武器 空</div>
  <div class="eqslot" id="eq-armor">🛡️ 護甲 空</div>
  <div class="eqslot" id="eq-access">💎 飾品 空</div>
</div>
<div id="canvas-wrap"><canvas id="gc"></canvas></div>

<!-- Hero select -->
<div id="hsov">
  <div id="hs-title">🏰 選擇英雄</div>
  <div style="color:#aaa;font-size:.8rem">每局只能選一次，被動永久生效</div>
  <div id="hs-cards"></div>
  <div id="hs-continue" style="display:none">
    <button onclick="loadGame(true)" style="background:linear-gradient(135deg,#1a4a1a,#0d2a0d);border:2px solid #4CAF50;border-radius:50px;padding:10px 28px;color:#90EE90;font-weight:900;cursor:pointer;font-family:inherit;font-size:.9rem">📂 繼續上次遊戲</button>
  </div>
</div>
<div id="tbar">
  <button class="tbtn sel" data-t="basic"     onclick="selT('basic')">🗼基礎砲<br><span class="tc">💰50</span></button>
  <button class="tbtn"     data-t="slow"      onclick="selT('slow')">❄️冰凍塔<br><span class="tc">💰75</span></button>
  <button class="tbtn"     data-t="bomb"      onclick="selT('bomb')">💣炸彈塔<br><span class="tc">💰100</span></button>
  <button class="tbtn"     data-t="lightning" onclick="selT('lightning')">⚡閃電塔<br><span class="tc">💰125</span></button>
</div>
<div id="savebar">
  <button class="svbtn" onclick="saveGame()">💾 存檔</button>
  <button class="svbtn" id="load-btn" onclick="loadGame()">📂 讀檔</button>
  <button class="svbtn" onclick="deleteSave()" style="color:#666">🗑️ 刪除</button>
  <span id="save-indicator">—</span>
</div>

<div id="uov">
  <div id="utitle">✨ 抽卡強化！</div>
  <div style="color:#aaa;font-size:.8rem">波次 <span id="uwn"></span> 完成 ｜ 傳說3% 史詩12% 稀有25% 普通60%</div>
  <div id="ucards"></div>
  <div style="display:flex;gap:10px;align-items:center">
    <button id="reroll-btn">🎲 重抽 <span id="reroll-cost">💰30</span></button>
    <button id="skip-btn">跳過</button>
  </div>
</div>
<div id="gov">
  <div id="gotitle">💀 基地淪陷！</div>
  <div id="gostats"></div>
  <button id="rebtn" onclick="restart()">🔄 再來一局</button>
</div>

<script>
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
const COLS=20, ROWS=13;
let CELL, W, H;

function resize(){
  const mw=Math.min(window.innerWidth,680);
  CELL=Math.floor(mw/COLS); W=COLS*CELL; H=ROWS*CELL;
  canvas.width=W; canvas.height=H;
}
resize(); window.addEventListener('resize',resize);

// ── PATH ──
const WP=[
  {x:0,y:2},{x:6,y:2},{x:6,y:6},{x:13,y:6},{x:13,y:2},{x:18,y:2},
  {x:18,y:10},{x:6,y:10},{x:6,y:7},{x:1,y:7}
];
const PCELLS=new Set();
(function buildPath(){
  for(let i=0;i<WP.length-1;i++){
    const a=WP[i],b=WP[i+1];
    if(a.x===b.x){const[y0,y1]=[Math.min(a.y,b.y),Math.max(a.y,b.y)];for(let y=y0;y<=y1;y++)PCELLS.add(a.x+','+y);}
    else{const[x0,x1]=[Math.min(a.x,b.x),Math.max(a.x,b.x)];for(let x=x0;x<=x1;x++)PCELLS.add(x+','+a.y);}
  }
})();

// ── HEROES ──
const HEROES=[
  {id:'archer',em:'🏹',nm:'弓箭手',
   dc:'射程+25%\n基礎砲傷害+30%',
   abl:'箭雨：對所有敵人造成50傷害',
   ap:s=>{s.rngM*=1.25;s.dmgM*=1.10;},
   use:s=>{s.enemies.forEach(e=>{if(!e.dead)hit(e,50,'n');});addFT(W/2,H/2,'🏹 箭雨！','#90EE90');}},
  {id:'mage',em:'🧙',nm:'冰霜法師',
   dc:'減速效果+30%\n冰凍塔傷害×2',
   abl:'全場冰封：所有敵人凍結4秒',
   ap:s=>{s.slowX+=.30;s.slowDmgM=2.0;},
   use:s=>{s.enemies.forEach(e=>{if(!e.dead)e.slt=4;});addFT(W/2,H/2,'❄️ 全場冰封！','#29B6F6');}},
  {id:'knight',em:'⚔️',nm:'鐵甲騎士',
   dc:'初始+8生命\n每波結束回1血',
   abl:'護盾：免疫下3次扣血',
   ap:s=>{s.lives+=8;s.lifeRegen=1;},
   use:s=>{s.shield=3;addFT(W/2,H/2,'🛡️ 護盾激活！','#FFD700');}},
  {id:'engineer',em:'⚙️',nm:'爆破工程師',
   dc:'炸彈範圍+1格\n建塔費用-20%',
   abl:'超級爆破：地圖中心大爆炸',
   ap:s=>{s.bombR+=1.0;s.costReduce=.20;},
   use:s=>{const cx=W/2,cy=H/2,r=4*CELL;s.enemies.forEach(e=>{if(!e.dead&&Math.hypot(e.x-cx,e.y-cy)<r)hit(e,200,'b');});mkParts(cx,cy,'#FF7043',30);addFT(cx,cy,'💣 超級爆破！','#FF7043');}},
  {id:'storm',em:'⚡',nm:'閃電術士',
   dc:'閃電連鎖+2目標\n射速+15%',
   abl:'閃電風暴：隨機閃電攻擊所有敵人',
   ap:s=>{s.chainBonus=2;s.spdM*=1.15;},
   use:s=>{s.enemies.forEach(e=>{if(!e.dead)hit(e,80,'l');});addFT(W/2,H/2,'⚡ 閃電風暴！','#FFD700');}},
];

// ── EQUIPMENT CARDS ──
const EQUIP=[
  // Weapon
  {ico:'🗡️',nm:'魔力之劍',dc:'全塔傷害+45%',rar:'eq',slot:'weapon',ap:s=>s.dmgM*=1.45},
  {ico:'⚡',nm:'雷霆戰矛',dc:'閃電連鎖+2，傷害+25%',rar:'eq',slot:'weapon',ap:s=>{s.chainBonus=(s.chainBonus||0)+2;s.dmgM*=1.25;}},
  {ico:'💣',nm:'爆破錘',dc:'炸彈範圍+1格，傷害+30%',rar:'eq',slot:'weapon',ap:s=>{s.bombR+=1;s.dmgM*=1.30;}},
  {ico:'❄️',nm:'霜雪弓',dc:'減速+35%，冰塔傷害×2',rar:'eq',slot:'weapon',ap:s=>{s.slowX+=.35;s.slowDmgM=(s.slowDmgM||1)*2;}},
  // Armor
  {ico:'🛡️',nm:'龍鱗護甲',dc:'生命+10，每波回血2',rar:'eq',slot:'armor',ap:s=>{s.lives+=10;s.lifeRegen=(s.lifeRegen||0)+2;}},
  {ico:'🔮',nm:'能量護盾',dc:'生命+6，射程+25%',rar:'eq',slot:'armor',ap:s=>{s.lives+=6;s.rngM*=1.25;}},
  {ico:'🪬',nm:'詛咒護甲',dc:'金幣×2，但生命-4',rar:'eq',slot:'armor',ap:s=>{s.goldM*=2;s.lives=Math.max(1,s.lives-4);}},
  // Accessory
  {ico:'💍',nm:'速度之戒',dc:'全塔射速+40%',rar:'eq',slot:'access',ap:s=>s.spdM*=1.40},
  {ico:'👑',nm:'黃金王冠',dc:'金幣×2.5',rar:'eq',slot:'access',ap:s=>s.goldM*=2.5},
  {ico:'🧿',nm:'命運護符',dc:'射程+30%，生命+5',rar:'eq',slot:'access',ap:s=>{s.rngM*=1.30;s.lives+=5;}},
  {ico:'🌟',nm:'命運之石',dc:'全屬性+25%',rar:'eq',slot:'access',ap:s=>{s.dmgM*=1.25;s.spdM*=1.25;s.rngM*=1.25;}},
];

// ── DEFS ──
const TD={
  basic:    {cost:50, range:2.5,dmg:22, spd:1.2,col:'#4CAF50',em:'🗼',nm:'基礎砲'},
  slow:     {cost:75, range:2.2,dmg:8,  spd:0.8,col:'#29B6F6',em:'❄️',nm:'冰凍塔'},
  bomb:     {cost:100,range:2.0,dmg:40, spd:0.55,col:'#FF7043',em:'💣',nm:'炸彈塔'},
  lightning:{cost:125,range:3.2,dmg:18, spd:1.4,col:'#FFD700',em:'⚡',nm:'閃電塔'},
};
const ED={
  normal:{hp:80, spd:55, rw:10,col:'#E53935',em:'👾',sz:.33},
  fast:  {hp:40, spd:115,rw:14,col:'#FF9800',em:'💨',sz:.26},
  tank:  {hp:320,spd:32, rw:28,col:'#6D4C41',em:'🛡️',sz:.44},
  boss:  {hp:900,spd:38, rw:75,col:'#7B1FA2',em:'👹',sz:.55},
};
// rarity: c=普通 r=稀有 e=史詩 l=傳說  weight: c=60 r=25 e=12 l=3
const UPGRADES=[
  // ── 普通 ──
  {ico:'⚔️',nm:'攻擊強化 I',  dc:'所有塔傷害+20%',      rar:'c',ap:s=>s.dmgM*=1.20},
  {ico:'🎯',nm:'射速強化 I',  dc:'所有塔射速+15%',      rar:'c',ap:s=>s.spdM*=1.15},
  {ico:'🔭',nm:'射程強化 I',  dc:'所有塔射程+15%',      rar:'c',ap:s=>s.rngM*=1.15},
  {ico:'💰',nm:'薄利多銷',    dc:'擊殺金幣+20%',        rar:'c',ap:s=>s.goldM*=1.20},
  {ico:'🎁',nm:'補給箱',      dc:'立即+80金幣',         rar:'c',ap:s=>s.gold+=80},
  {ico:'❤️',nm:'急救包',      dc:'恢復3生命',           rar:'c',ap:s=>s.lives=Math.min(s.lives+3,30)},
  {ico:'❄️',nm:'冰封初階',    dc:'減速效果+15%',        rar:'c',ap:s=>s.slowX+=.15},
  {ico:'💥',nm:'爆炸初階',    dc:'炸彈範圍+0.4格',      rar:'c',ap:s=>s.bombR+=.4},
  // ── 稀有 ──
  {ico:'⚔️',nm:'攻擊強化 II', dc:'所有塔傷害+35%',      rar:'r',ap:s=>s.dmgM*=1.35},
  {ico:'🎯',nm:'射速強化 II', dc:'所有塔射速+30%',      rar:'r',ap:s=>s.spdM*=1.30},
  {ico:'🔭',nm:'射程強化 II', dc:'所有塔射程+30%',      rar:'r',ap:s=>s.rngM*=1.30},
  {ico:'💰',nm:'貪婪',        dc:'擊殺金幣+40%',        rar:'r',ap:s=>s.goldM*=1.40},
  {ico:'🎁',nm:'大補給',      dc:'立即+200金幣',        rar:'r',ap:s=>s.gold+=200},
  {ico:'🏰',nm:'強化防禦',    dc:'最大生命+5',          rar:'r',ap:s=>s.lives+=5},
  {ico:'❄️',nm:'冰封加深',    dc:'減速效果+25%',        rar:'r',ap:s=>s.slowX+=.25},
  {ico:'💥',nm:'爆炸擴散',    dc:'炸彈範圍+0.8格',      rar:'r',ap:s=>s.bombR+=.8},
  // ── 史詩 ──
  {ico:'🔥',nm:'烈焰強化',    dc:'所有塔傷害+55%',      rar:'e',ap:s=>s.dmgM*=1.55},
  {ico:'⚡',nm:'超速模式',    dc:'所有塔射速+50%',      rar:'e',ap:s=>s.spdM*=1.50},
  {ico:'🌐',nm:'廣域掃描',    dc:'所有塔射程+50%',      rar:'e',ap:s=>s.rngM*=1.50},
  {ico:'💎',nm:'鑽石財庫',    dc:'擊殺金幣×2',         rar:'e',ap:s=>s.goldM*=2.0},
  {ico:'🩸',nm:'吸血改造',    dc:'傷害+30% 且回血',     rar:'e',ap:s=>{s.dmgM*=1.30;s.lives=Math.min(s.lives+8,30);}},
  {ico:'🌀',nm:'時間之渦',    dc:'射速+40% 射程+30%',  rar:'e',ap:s=>{s.spdM*=1.40;s.rngM*=1.30;}},

function rollRarity(){
  const r=Math.random()*100;
  return r<3?'l':r<15?'e':r<40?'r':'c';
}
function drawCards(n){
  const result=[];
  // 15% chance one card is equipment
  const allCards=[...UPGRADES];
  // inject one equipment card randomly
  if(Math.random()<.40){
    const avEq=EQUIP.filter(e=>!S.equip[e.slot]);
    if(avEq.length) allCards.push(avEq[Math.floor(Math.random()*avEq.length)]);
  }
  const byRar={c:[],r:[],e:[],l:[],eq:[]};
  allCards.forEach(u=>byRar[u.rar]?.push(u)||byRar.c.push(u));
  EQUIP.forEach(u=>byRar.eq.push(u));
  for(let i=0;i<n;i++){
    let rar=rollRarity(), pool=byRar[rar];
    if(!pool.length){rar='c';pool=byRar['c'];}
    const avail=pool.filter(u=>!result.includes(u));
    result.push(avail.length?avail[Math.floor(Math.random()*avail.length)]:pool[Math.floor(Math.random()*pool.length)]);
  }
  return result;
}
const RAR_META={
  c:{cls:'rc',bcls:'brc',ncls:'cc',lbl:'⬜ 普通'},
  r:{cls:'rr',bcls:'brr',ncls:'cr',lbl:'🔵 稀有'},
  e:{cls:'re',bcls:'bre',ncls:'ce',lbl:'🟣 史詩'},
  l:{cls:'rl',bcls:'brl',ncls:'cl',lbl:'🟡 傳說'},
  eq:{cls:'req',bcls:'breq',ncls:'ceq',lbl:'🟠 裝備'},
};

     towers:[],enemies:[],projs:[],parts:[],

// ── WAVE GEN ──
function genWave(n){
  const arr=[], cnt=8+n*3, boss=n%5===0&&n>0;
  for(let i=0;i<cnt;i++){
    let tp;
    if(boss&&i===Math.floor(cnt/2))tp='boss';
    else if(n>=4&&Math.random()<.15)tp='tank';
    else if(n>=2&&Math.random()<.28)tp='fast';
    else tp='normal';
    arr.push(tp);
  }
  return arr;
}
function mkEnemy(tp){
  const d=ED[tp], hm=1+S.wave*.12;
  return{tp,hp:d.hp*hm,mhp:d.hp*hm,spd:d.spd,rw:d.rw,col:d.col,sz:d.sz,
    em:d.em,wpi:1,x:WP[0].x*CELL+CELL/2,y:WP[0].y*CELL+CELL/2,
    slt:0,dead:false,id:Math.random()};
}

// ── TOWER LOGIC ──
function placeTower(gx,gy){
  const d=TD[S.selT];
  const cost=Math.round(d.cost*(1-(S.costReduce||0)));
  if(S.gold<cost)return;
  if(PCELLS.has(gx+','+gy))return;
  if(S.towers.find(t=>t.gx===gx&&t.gy===gy))return;
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;
  S.gold-=cost;
  S.towers.push({tp:S.selT,gx,gy,x:gx*CELL+CELL/2,y:gy*CELL+CELL/2,cd:0,ang:0});
  updateHUD();
}

function towerTick(t,dt){
  const d=TD[t.tp];
  const range=d.range*CELL*S.rngM;
  const fireRate=d.spd*S.spdM;
  const dmg=d.dmg*S.dmgM;
  t.cd-=dt;
  if(t.cd>0)return;
  const alive=S.enemies.filter(e=>!e.dead&&Math.hypot(e.x-t.x,e.y-t.y)<=range);
  if(!alive.length)return;
  alive.sort((a,b)=>b.wpi-a.wpi);
  const tgt=alive[0];
  t.ang=Math.atan2(tgt.y-t.y,tgt.x-t.x);
  t.cd=1/fireRate;
  if(t.tp==='lightning'){
    S.projs.push({tp:'lightning',tower:t,chain:alive.slice(0,3+(S.chainBonus||0)),dmg,timer:.18,done:false});
  } else {
    S.projs.push({tp:t.tp,x:t.x,y:t.y,tgt,spd:320,dmg,tower:t,done:false});
  }
}

// ── ENEMY TICK ──
function enemyTick(e,dt){
  const slowAmt=e.slt>0?(0.5+S.slowX):0;
  if(e.slt>0)e.slt-=dt;
  const spd=e.spd*(1-Math.min(slowAmt,.85))*CELL;
  const wp=WP[e.wpi];
  const tx=wp.x*CELL+CELL/2, ty=wp.y*CELL+CELL/2;
  const dx=tx-e.x, dy=ty-e.y, dist=Math.hypot(dx,dy);
  if(dist<4){
    e.wpi++;
    if(e.wpi>=WP.length){e.dead=true;S.lives--;updateHUD();if(S.lives<=0)gameOver();return;}
  } else {
    const mv=Math.min(spd*dt,dist);
    e.x+=dx/dist*mv; e.y+=dy/dist*mv;
  }
}

// ── PROJ TICK ──
function projTick(p,dt){
  if(p.tp==='lightning'){
    p.timer-=dt;
    if(p.timer<=0){p.chain.forEach(e=>{if(!e.dead)hit(e,p.dmg,'l')});p.done=true;}
    return;
  }
  if(!p.tgt||p.tgt.dead){p.done=true;return;}
  p.x+=(p.tgt.x-p.x)/Math.hypot(p.tgt.x-p.x||.01,p.tgt.y-p.y||.01)*p.spd*dt;
  p.y+=(p.tgt.y-p.y)/Math.hypot(p.tgt.x-p.x||.01,p.tgt.y-p.y||.01)*p.spd*dt;
  if(Math.hypot(p.tgt.x-p.x,p.tgt.y-p.y)<12){
    if(p.tp==='bomb'){
      const r=(1.2+S.bombR)*CELL;
      S.enemies.forEach(e=>{if(!e.dead&&Math.hypot(e.x-p.x,e.y-p.y)<r)hit(e,p.dmg,'b')});
      mkParts(p.x,p.y,'#FF7043',14);
    } else if(p.tp==='slow'){
      hit(p.tgt,p.dmg,'s'); p.tgt.slt=2.2;
    } else {
      hit(p.tgt,p.dmg,'n');
    }
    p.done=true;
  }
}

function hit(e,dmg,src){
  if(e.dead)return;
  if(src!=='n'&&src!=='b'&&src!=='l'&&S.shield>0){S.shield--;return;}
  if(src==='s') dmg*=(S.slowDmgM||1);
  e.hp-=dmg;
  addFT(e.x,e.y,'-'+Math.round(dmg),src==='s'?'#29B6F6':'#fff');
  if(e.hp<=0){
    e.dead=true;
    const rw=Math.round(e.rw*S.goldM);
    S.gold+=rw; S.score+=e.rw;
    addFT(e.x,e.y-16,'+'+rw+'💰','#FFD700');
    mkParts(e.x,e.y,e.col,8);
    updateHUD();
  }
}

// ── PARTICLES / FLOAT TEXT ──
function mkParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=40+Math.random()*80;
    S.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:.7});
  }
}
function addFT(x,y,txt,col){fts.push({x,y,txt,col,life:1,vy:-38});}

// ── DRAW ──
function draw(){
  ctx.clearRect(0,0,W,H);
  // Grid
  for(let gy=0;gy<ROWS;gy++)for(let gx=0;gx<COLS;gx++){
    const ip=PCELLS.has(gx+','+gy);
    ctx.fillStyle=ip?'#3d2b1f':(gx+gy)%2===0?'#173017':'#143014';
    ctx.fillRect(gx*CELL,gy*CELL,CELL,CELL);
    if(ip){ctx.fillStyle='#5a3d28';ctx.fillRect(gx*CELL+2,gy*CELL+2,CELL-4,CELL-4);}
  }
  // Path direction indicators
  ctx.fillStyle='rgba(255,200,100,.12)'; ctx.font=`${CELL*.5}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<WP.length-1;i++){
    const a=WP[i],b=WP[i+1];
    const mx=(a.x+b.x)/2*CELL+CELL/2, my=(a.y+b.y)/2*CELL+CELL/2;
    const ang=Math.atan2(b.y-a.y,b.x-a.x);
    ctx.save(); ctx.translate(mx,my); ctx.rotate(ang); ctx.fillText('→',0,0); ctx.restore();
  }
  // Hover preview
  if(S.hov&&!PCELLS.has(S.hov.x+','+S.hov.y)&&!S.towers.find(t=>t.gx===S.hov.x&&t.gy===S.hov.y)){
    const d=TD[S.selT], px=S.hov.x*CELL+CELL/2, py=S.hov.y*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(px,py,d.range*CELL*S.rngM,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,215,0,.4)'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='rgba(255,215,0,.1)'; ctx.fill(); ctx.lineWidth=1;
    ctx.fillStyle='rgba(255,215,0,.2)'; ctx.fillRect(S.hov.x*CELL+1,S.hov.y*CELL+1,CELL-2,CELL-2);
  }
  // Towers
  S.towers.forEach(t=>{
    const d=TD[t.tp], r=TD[t.tp].range*CELL*S.rngM;
    ctx.fillStyle=d.col+'22'; ctx.fillRect(t.gx*CELL+2,t.gy*CELL+2,CELL-4,CELL-4);
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.ang);
    ctx.fillStyle=d.col; ctx.fillRect(0,-CELL*.08,CELL*.36,CELL*.16); ctx.restore();
    ctx.font=`${CELL*.5}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(d.em,t.x,t.y);
  });
  // Enemies
  S.enemies.forEach(e=>{
    if(e.dead)return;
    const r=e.sz*CELL;
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.beginPath(); ctx.ellipse(e.x,e.y+r*.8,r*.7,r*.3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=e.col;
    ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill();
    if(e.slt>0){ctx.strokeStyle='#29B6F6';ctx.lineWidth=2;ctx.stroke();ctx.lineWidth=1;}
    const bw=CELL*.8, bh=4, bx=e.x-bw/2, by=e.y-r-8;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.mhp;
    ctx.fillStyle=pct>.5?'#4CAF50':pct>.25?'#FF9800':'#F44336';
    ctx.fillRect(bx,by,bw*pct,bh);
    ctx.font=`${r*1.5}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.em,e.x,e.y);
  });
  // Projectiles
  S.projs.forEach(p=>{
    if(p.tp==='lightning'){
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
      let prev={x:p.tower.x,y:p.tower.y};
      p.chain.forEach(e=>{
        ctx.beginPath(); ctx.moveTo(prev.x,prev.y); ctx.lineTo(e.x,e.y); ctx.stroke();
        prev={x:e.x,y:e.y};
      });
      ctx.shadowBlur=0; ctx.lineWidth=1; return;
    }
    const cols={basic:'#4CAF50',slow:'#29B6F6',bomb:'#FF7043'};
    ctx.fillStyle=cols[p.tp]||'#fff';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.tp==='bomb'?6:4,0,Math.PI*2); ctx.fill();
  });
  // Particles
  S.parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Float texts
  fts.forEach(f=>{ctx.globalAlpha=f.life;ctx.fillStyle=f.col;ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);});
  ctx.globalAlpha=1;
  // Entrance / Exit markers
  ctx.font=`${CELL*.65}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  const sp=WP[0]; ctx.fillText('🚪',sp.x*CELL+CELL/2,sp.y*CELL+CELL/2);
  const ep=WP[WP.length-1]; ctx.fillText('🏰',ep.x*CELL+CELL/2,ep.y*CELL+CELL/2);
}

// ── LOOP ──
function loop(ts){
  if(S.gameOver)return;
  const dt=Math.min((ts-(S.lastT||ts))/1000,.05); S.lastT=ts;

  if(running){
    S.spawnT-=dt;
    if(S.spawnI<S.waveQ.length&&S.spawnT<=0){
      S.enemies.push(mkEnemy(S.waveQ[S.spawnI++]));
      S.spawnT=.75;
    }
    S.enemies.forEach(e=>{if(!e.dead)enemyTick(e,dt)});
    S.enemies=S.enemies.filter(e=>!e.dead);
    S.towers.forEach(t=>towerTick(t,dt));
    S.projs.forEach(p=>projTick(p,dt));
    S.projs=S.projs.filter(p=>!p.done);
    S.parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=80*dt;p.life-=dt*2;});
    S.parts=S.parts.filter(p=>p.life>0);
    fts.forEach(f=>{f.y+=f.vy*dt;f.life-=dt*1.5;});
    fts=fts.filter(f=>f.life>0);
    if(S.spawnI>=S.waveQ.length&&S.enemies.length===0&&!waveCleared){
      waveCleared=true; running=false;
      // Life regen
      if(S.lifeRegen>0) S.lives=Math.min(S.lives+S.lifeRegen,30);
      // Recharge ability
      S.abilityReady=true;
      const ab=document.getElementById('abtn');
      ab.disabled=false; ab.classList.add('rdy');
      saveGame(); // auto-save between waves
      updateHUD();
      setTimeout(showUpgrades,700);
    }
  }
  draw();
  requestAnimationFrame(loop);
}

// ── WAVE / UPGRADES ──
function startWave(){
  if(running)return;
  S.wave++;
  S.waveQ=genWave(S.wave); S.spawnI=0; S.spawnT=0;
  waveCleared=false; running=true;
  S.enemies=[]; S.projs=[];
  updateHUD();
  document.getElementById('wave-btn').disabled=true;
}

let rerollCost=30;
function showUpgrades(cards){
  cards=cards||drawCards(3);
  document.getElementById('uwn').textContent=S.wave;
  const c=document.getElementById('ucards'); c.innerHTML='';
  cards.forEach(u=>{
    const m=RAR_META[u.rar];
    const d=document.createElement('div');
    d.className='ucard '+m.cls;
    d.innerHTML=`<div><span class="rbadge ${m.bcls}">${m.lbl}</span></div><div class="uico">${u.ico}</div><div class="unm ${m.ncls}">${u.nm}</div><div class="udc">${u.dc}</div>`;
    d.onclick=()=>{
      if(u.slot){
        // Equipment card - equip into slot
        S.equip[u.slot]=u;
        updateEqUI();
      }
      u.ap(S);
      document.getElementById('uov').classList.remove('show');
      document.getElementById('wave-btn').disabled=false;
      rerollCost=30;
      updateHUD();
    };
    c.appendChild(d);
  });
  // Reroll button
  const rb=document.getElementById('reroll-btn');
  document.getElementById('reroll-cost').textContent='💰'+rerollCost;
  rb.disabled=S.gold<rerollCost;
  rb.onclick=()=>{
    if(S.gold<rerollCost)return;
    S.gold-=rerollCost;
    rerollCost=Math.round(rerollCost*1.6);
    showUpgrades(drawCards(3));
    updateHUD();
  };
  // Skip button
  document.getElementById('skip-btn').onclick=()=>{
    document.getElementById('uov').classList.remove('show');
    document.getElementById('wave-btn').disabled=false;
    rerollCost=30;
  };
  document.getElementById('uov').classList.add('show');
}

function gameOver(){
  S.gameOver=true;
  document.getElementById('gostats').innerHTML=
    `到達第 ${S.wave} 波<br>最終分數：${S.score} 分<br>消滅敵人：${Math.round(S.score/10)} 隻`;
  document.getElementById('gov').classList.add('show');
}

function restart(){
  document.getElementById('gov').classList.remove('show');
  document.getElementById('uov').classList.remove('show');
  document.getElementById('hero-badge').textContent='';
  initS();
  requestAnimationFrame(loop);
}

// ── INPUT ──
function selT(tp){
  S.selT=tp;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('sel',b.dataset.t===tp));
}
function getCell(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX??e.touches?.[0]?.clientX)-r.left;
  const cy=(e.clientY??e.touches?.[0]?.clientY)-r.top;
  return{x:Math.floor(cx/CELL),y:Math.floor(cy/CELL)};
}
canvas.addEventListener('click',e=>{const c=getCell(e);placeTower(c.x,c.y);});
canvas.addEventListener('mousemove',e=>{S.hov=getCell(e);});
canvas.addEventListener('mouseleave',()=>{S.hov=null;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const c=getCell(e);placeTower(c.x,c.y);},{passive:false});
document.getElementById('wave-btn').addEventListener('click',startWave);
document.getElementById('abtn').addEventListener('click',useAbility);

// ── HUD ──
function updateHUD(){
  document.getElementById('hl').textContent=S.lives+(S.shield>0?' 🛡'+S.shield:'');
  document.getElementById('hg').textContent=S.gold;
  document.getElementById('hw').textContent=S.wave;
  document.getElementById('hs').textContent=S.score;
  document.querySelectorAll('.tbtn').forEach(b=>{
    const cost=Math.round(TD[b.dataset.t].cost*(1-(S.costReduce||0)));
    b.querySelector('.tc').textContent='💰'+cost;
    b.classList.toggle('na',S.gold<cost);
  });
}

initS();
requestAnimationFrame(loop);
</script>
</body>
</html>
