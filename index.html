<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 การผจญภัยการบวก!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #FF6B9D;
    --purple: #9B59B6;
    --blue: #3D5AF1;
    --green: #00C853;
    --gold: #FFD700;
  }

  body {
    font-family: 'Microsoft JhengHei', '微軟正黑體', 'PingFang TC', sans-serif;
    background: linear-gradient(160deg, #FFF0F5 0%, #E8F4FF 40%, #F5FFF0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px 30px;
    overflow-x: hidden;
    position: relative;
  }

  .bg-bubble {
    position: fixed;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
    animation: floatBubble linear infinite;
  }
  @keyframes floatBubble {
    0% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
    100% { transform: translateY(0) scale(1); }
  }

  .title-area {
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .title-area h1 {
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    font-weight: 900;
    color: var(--pink);
    text-shadow: 3px 3px 0 #FFB3D1, 5px 5px 0 rgba(255,107,157,0.15);
    letter-spacing: 4px;
    animation: titleWiggle 3s ease-in-out infinite;
  }
  @keyframes titleWiggle {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }
  .subtitle {
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    color: var(--purple);
    margin-top: 4px;
    font-weight: 700;
  }

  .top-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    border-radius: 50px;
    padding: 10px 22px;
    box-shadow: 0 4px 15px rgba(255,165,0,0.45), 0 2px 0 rgba(0,0,0,0.1);
    border: 3px solid rgba(255,255,255,0.6);
    transition: transform 0.2s;
  }
  .streak-badge.bump {
    animation: bump 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes bump {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) rotate(-3deg); }
  }
  .streak-icon { font-size: 1.6rem; }
  .streak-text {
    font-size: 1rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
  }
  .streak-num {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    min-width: 44px;
    text-align: center;
    transition: all 0.2s;
  }
  .score-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #A78BFA, #7C3AED);
    border-radius: 50px;
    padding: 10px 22px;
    box-shadow: 0 4px 15px rgba(124,58,237,0.35), 0 2px 0 rgba(0,0,0,0.1);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .score-text {
    font-size: 1rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }

  .stars-row {
    display: flex;
    gap: 5px;
    margin-bottom: 14px;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .star {
    font-size: 1.7rem;
    opacity: 0.2;
    filter: grayscale(1) brightness(0.6);
    transition: all 0.3s;
    cursor: default;
    user-select: none;
  }
  .star.lit {
    opacity: 1;
    filter: none;
    animation: starPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes starPop {
    0% { transform: scale(0) rotate(-40deg); }
    60% { transform: scale(1.4) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .mascot-area {
    position: relative;
    margin-bottom: 4px;
    z-index: 1;
  }
  .mascot {
    font-size: clamp(4rem, 12vw, 5.5rem);
    display: inline-block;
    animation: mascotFloat 2.5s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.12));
    cursor: pointer;
    user-select: none;
    transition: filter 0.3s;
  }
  @keyframes mascotFloat {
    0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
    50% { transform: translateY(-14px) rotate(4deg) scale(1.04); }
  }
  .mascot.celebrate {
    animation: mascotCelebrate 0.45s ease-in-out 4;
  }
  @keyframes mascotCelebrate {
    0%, 100% { transform: scale(1) rotate(0); }
    25% { transform: scale(1.35) rotate(-18deg) translateY(-8px); }
    75% { transform: scale(1.35) rotate(18deg) translateY(-8px); }
  }
  .mascot.shake {
    animation: mascotShake 0.5s ease-in-out;
  }
  @keyframes mascotShake {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-12px) rotate(-8deg); }
    40% { transform: translateX(12px) rotate(8deg); }
    60% { transform: translateX(-10px) rotate(-5deg); }
    80% { transform: translateX(10px) rotate(5deg); }
  }
  .mascot-tip {
    position: absolute;
    bottom: -8px;
    right: -10px;
    font-size: 0.7rem;
    color: #999;
    white-space: nowrap;
  }

  .speech-bubble {
    position: relative;
    background: #fff;
    border: 3px solid #FFB3D1;
    border-radius: 22px;
    padding: 12px 24px;
    margin-bottom: 18px;
    max-width: 400px;
    width: 94%;
    text-align: center;
    box-shadow: 0 5px 20px rgba(255,179,209,0.3);
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    color: #E91E8C;
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    transition: border-color 0.3s, color 0.3s, transform 0.2s;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -17px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-bottom-color: #FFB3D1;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: #fff;
    z-index: 1;
  }
  .speech-bubble.pop {
    animation: bubblePop 0.35s ease-out;
  }
  @keyframes bubblePop {
    0% { transform: scale(0.85); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  .question-card {
    background: #fff;
    border-radius: 28px;
    padding: 24px 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 2px 0 rgba(0,0,0,0.05);
    border: 4px solid #E8D5FF;
    margin-bottom: 20px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .question-card.new-question {
    animation: cardSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes cardSlideIn {
    0% { transform: translateY(-20px) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .question-label {
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: #bbb;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .question-text {
    font-size: clamp(2.8rem, 11vw, 5.2rem);
    font-weight: 900;
    color: var(--blue);
    letter-spacing: 4px;
    line-height: 1.1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .num {
    display: inline-block;
    min-width: 1.1ch;
    text-align: center;
    animation: numPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes numPop {
    0% { transform: scale(0) rotate(-25deg); opacity: 0; }
    70% { transform: scale(1.15) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .op { color: var(--pink); font-size: 0.85em; }
  .eq { color: var(--purple); font-size: 0.85em; }
  .blank-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.4ch;
    height: 1.1em;
    border-bottom: 6px solid var(--blue);
    color: var(--green);
    position: relative;
  }
  .blank-box.empty::after {
    content: '？';
    font-size: 0.65em;
    color: var(--blue);
    animation: qPulse 1.1s ease-in-out infinite;
  }
  @keyframes qPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.2); }
  }
  .blank-box.filled {
    border-bottom-color: var(--green);
    animation: answerReveal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: var(--green);
  }
  @keyframes answerReveal {
    0% { transform: scale(0) rotateY(90deg); opacity: 0; }
    100% { transform: scale(1) rotateY(0); opacity: 1; }
  }
  .blank-box.filled-wrong {
    border-bottom-color: #FF5252;
    color: #FF5252;
  }

  .dots-display {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 12px;
    min-height: 28px;
  }
  .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-block;
    animation: dotPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
  }
  @keyframes dotPop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .dot-sep { font-size: 1.2rem; color: var(--pink); font-weight: 900; align-self: center; }

  .answers-label {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: #888;
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
    z-index: 1;
    position: relative;
  }
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    max-width: 490px;
    width: 100%;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .ans-btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 16px;
    font-size: clamp(1.1rem, 3.5vw, 1.7rem);
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.18);
    position: relative;
    top: 0;
    font-family: inherit;
    outline: none;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .ans-btn:not(:disabled):hover {
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
  }
  .ans-btn:not(:disabled):active {
    top: 4px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    transform: scale(0.93);
  }

  .ans-btn[data-n="0"]  { background: linear-gradient(135deg,#A0AEC0,#718096); }
  .ans-btn[data-n="1"]  { background: linear-gradient(135deg,#FC8181,#E53E3E); }
  .ans-btn[data-n="2"]  { background: linear-gradient(135deg,#F6AD55,#DD6B20); }
  .ans-btn[data-n="3"]  { background: linear-gradient(135deg,#F6E05E,#D69E2E); color:#333;text-shadow:none; }
  .ans-btn[data-n="4"]  { background: linear-gradient(135deg,#68D391,#276749); }
  .ans-btn[data-n="5"]  { background: linear-gradient(135deg,#4FD1C5,#2C7A7B); }
  .ans-btn[data-n="6"]  { background: linear-gradient(135deg,#63B3ED,#2B6CB0); }
  .ans-btn[data-n="7"]  { background: linear-gradient(135deg,#76E4F7,#0987A0); }
  .ans-btn[data-n="8"]  { background: linear-gradient(135deg,#B794F4,#6B46C1); }
  .ans-btn[data-n="9"]  { background: linear-gradient(135deg,#F687B3,#B83280); }
  .ans-btn[data-n="10"] { background: linear-gradient(135deg,#FC8181,#C53030); }
  .ans-btn[data-n="11"] { background: linear-gradient(135deg,#F6AD55,#C05621); }
  .ans-btn[data-n="12"] { background: linear-gradient(135deg,#9AE6B4,#276749); }
  .ans-btn[data-n="13"] { background: linear-gradient(135deg,#76E4F7,#086F83); }
  .ans-btn[data-n="14"] { background: linear-gradient(135deg,#B794F4,#553C9A); }
  .ans-btn[data-n="15"] { background: linear-gradient(135deg,#FBB6CE,#97266D); }
  .ans-btn[data-n="16"] { background: linear-gradient(135deg,#F6E05E,#B7791F); color:#333;text-shadow:none; }
  .ans-btn[data-n="17"] { background: linear-gradient(135deg,#68D391,#22543D); }
  .ans-btn[data-n="18"] { background: linear-gradient(135deg,#63B3ED,#2A4365); }
  .ans-btn[data-n="19"] { background: linear-gradient(135deg,#FC8181,#742A2A); }
  .ans-btn[data-n="20"] { background: linear-gradient(135deg,#D6BCFA,#553C9A); }

  .ans-btn.correct-anim {
    background: linear-gradient(135deg, #00E676, #00C853) !important;
    box-shadow: 0 0 0 4px rgba(0,230,118,0.4), 0 5px 0 #007A33 !important;
    animation: btnCorrect 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes btnCorrect {
    0%, 100% { transform: scale(1); }
    40% { transform: scale(1.3) rotate(-5deg); }
    70% { transform: scale(1.2) rotate(5deg); }
  }
  .ans-btn.wrong-anim {
    background: linear-gradient(135deg,#FF5252,#B71C1C) !important;
    box-shadow: 0 0 0 4px rgba(255,82,82,0.4), 0 5px 0 #7F0000 !important;
    animation: btnWrong 0.45s ease-in-out;
  }
  @keyframes btnWrong {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-10px) rotate(-5deg); }
    40% { transform: translateX(10px) rotate(5deg); }
    60% { transform: translateX(-8px) rotate(-3deg); }
    80% { transform: translateX(8px) rotate(3deg); }
  }

  #next-btn {
    display: none;
    background: linear-gradient(135deg, #FF6B9D, #FF4757);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 44px;
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #B71C55, 0 10px 24px rgba(255,71,87,0.35);
    font-family: inherit;
    letter-spacing: 2px;
    margin-bottom: 16px;
    position: relative;
    top: 0;
    z-index: 1;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, box-shadow 0.15s, top 0.15s;
  }
  #next-btn.visible { display: inline-block; animation: nextBtnIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes nextBtnIn {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  #next-btn:hover { transform: translateY(-3px) scale(1.05); }
  #next-btn:active { top: 5px; box-shadow: 0 1px 0 #B71C55; }

  #confetti-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .cf {
    position: absolute;
    top: -30px;
    font-size: 1.3rem;
    animation: cfFall linear forwards;
    will-change: transform, opacity;
  }
  @keyframes cfFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    75%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.4); }
  }

  #big-badge {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 7rem;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    will-change: transform;
  }
  #big-badge.show { transform: translate(-50%, -50%) scale(1); }
  #big-badge.hide { transform: translate(-50%, -50%) scale(0); transition: transform 0.18s ease-in; }

  .float-star {
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    font-size: 1.8rem;
    animation: floatUp 1.2s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(30deg); }
  }

  @media (max-width: 420px) {
    .answer-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
    .question-card { padding: 18px 20px; }
  }
  @media (max-width: 340px) {
    .answer-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .ans-btn { font-size: 1rem; border-radius: 12px; }
  }
</style>
</head>
<body>

<div class="bg-bubble" style="width:300px;height:300px;background:#FF6B9D;top:-80px;left:-80px;animation-duration:6s;"></div>
<div class="bg-bubble" style="width:250px;height:250px;background:#3D5AF1;bottom:-60px;right:-60px;animation-duration:8s;animation-delay:2s;"></div>
<div class="bg-bubble" style="width:180px;height:180px;background:#FFD700;top:40%;left:-50px;animation-duration:7s;animation-delay:1s;"></div>

<div id="confetti-layer"></div>
<div id="big-badge"></div>

<div class="title-area">
  <h1>🌈 การผจญภัยการบวก!</h1>
  <div class="subtitle">ฉันบวกเลขได้! ลองกดดูนะ! 🎉</div>
</div>

<div class="top-bar">
  <div class="streak-badge" id="streak-badge">
    <span class="streak-icon">🔥</span>
    <span class="streak-text">ชนะต่อเนื่อง</span>
    <span class="streak-num" id="streak-num">0</span>
    <span class="streak-text">ครั้ง</span>
  </div>
  <div class="score-badge">
    <span class="score-text" id="score-text">ตอบถูก 0 / 0</span>
  </div>
</div>

<div class="stars-row" id="stars-row">
  <span class="star" id="star-1">⭐</span>
  <span class="star" id="star-2">⭐</span>
  <span class="star" id="star-3">⭐</span>
  <span class="star" id="star-4">⭐</span>
  <span class="star" id="star-5">⭐</span>
</div>

<div class="mascot-area">
  <div class="mascot" id="mascot" title="กดฉันเพื่อเปลี่ยนลุค!">🐱</div>
  <div class="mascot-tip">กดเพื่อเปลี่ยนตัวละคร 👆</div>
</div>

<div class="speech-bubble" id="speech-bubble">มาคำนวณกันเลย! 🌟</div>

<div class="question-card" id="question-card">
  <div class="question-label">กรุณาคำนวณโจทย์บวกนี้:</div>
  <div class="question-text" id="question-text">
    <span class="num" id="num1-el">？</span>
    <span class="op"> ＋ </span>
    <span class="num" id="num2-el">？</span>
    <span class="eq"> ＝ </span>
    <span class="blank-box empty" id="answer-blank"></span>
  </div>
  <div class="dots-display" id="dots-display"></div>
</div>

<div class="answers-label">👇 เลือกคำตอบที่ถูกต้อง!</div>
<div class="answer-grid" id="answer-grid"></div>

<button id="next-btn" onclick="nextQuestion()">✨ โจทย์ต่อไป ➡️</button>

<script>
let actx = null;
function ctx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function playNote(freq, type, startTime, dur, vol, detune = 0) {
  const c = ctx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  const now = c.currentTime + startTime;
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if (detune) osc.detune.setValueAtTime(detune, now);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.02);
  gain.gain.setValueAtTime(vol, now + dur * 0.7);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.connect(gain);
  gain.connect(c.destination);
  osc.start(now);
  osc.stop(now + dur + 0.01);
}

function playRichNote(freq, startTime, dur, vol) {
  playNote(freq,       'sine',     startTime, dur, vol * 0.6);
  playNote(freq * 2,   'sine',     startTime, dur, vol * 0.25);
  playNote(freq * 3,   'triangle', startTime, dur, vol * 0.1);
  playNote(freq * 0.5, 'sine',     startTime, dur, vol * 0.15);
}

function sfxClick() {
  const c = ctx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  const now = c.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain);
  gain.connect(c.destination);
  osc.start(now);
  osc.stop(now + 0.1);
}

function sfxCorrect() {
  const scale = [523.25, 659.25, 783.99, 1046.50];
  scale.forEach((f, i) => { playRichNote(f, i * 0.12, 0.28, 0.28); });
  playRichNote(523.25, scale.length * 0.12 + 0.05, 0.5, 0.2);
  playRichNote(659.25, scale.length * 0.12 + 0.05, 0.5, 0.2);
  playRichNote(783.99, scale.length * 0.12 + 0.05, 0.5, 0.2);
}

function sfxStreak() {
  const melody = [
    [523.25, 0.00],[587.33, 0.10],[659.25, 0.20],[698.46, 0.30],
    [783.99, 0.40],[880.00, 0.53],[987.77, 0.66],[1046.50, 0.80],
  ];
  melody.forEach(([f, t]) => playRichNote(f, t, 0.22, 0.3));
  playRichNote(523.25, 1.05, 0.8, 0.22);
  playRichNote(659.25, 1.05, 0.8, 0.22);
  playRichNote(783.99, 1.05, 0.8, 0.22);
  playRichNote(1046.50, 1.05, 0.8, 0.18);
}

function sfxWrong() {
  const c = ctx();
  const now = c.currentTime;
  ['sine', 'triangle'].forEach((type, ti) => {
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(350, now + ti * 0.01);
    osc.frequency.linearRampToValueAtTime(250, now + 0.35);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.12, now + 0.04);
    gain.gain.linearRampToValueAtTime(0, now + 0.4);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(now);
    osc.stop(now + 0.45);
  });
  const bufSize = c.sampleRate * 0.06;
  const buf = c.createBuffer(1, bufSize, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = c.createBufferSource();
  const flt = c.createBiquadFilter();
  const g = c.createGain();
  src.buffer = buf;
  flt.type = 'bandpass';
  flt.frequency.value = 300;
  g.gain.setValueAtTime(0.08, now);
  g.gain.linearRampToValueAtTime(0, now + 0.08);
  src.connect(flt);
  flt.connect(g);
  g.connect(c.destination);
  src.start(now);
}

function sfxNext() {
  playNote(440, 'sine', 0, 0.08, 0.15);
  playNote(550, 'sine', 0.08, 0.08, 0.15);
}

let n1 = 0, n2 = 0, ans = 0;
let streak = 0, totalQ = 0, totalC = 0;
let answered = false;

const mascots = ['🐱','🐶','🐼','🐸','🦊','🐰','🐨','🦁','🐯','🐻','🐧','🐥'];
let mascotIdx = 0;

const dotColors = ['#FF6B9D','#FF8C42','#FFD93D','#6BCF7F','#4EC9E1','#9B59B6','#F97316','#06B6D4'];

function genQ() {
  do {
    n1 = Math.floor(Math.random() * 10) + 1;
    n2 = Math.floor(Math.random() * 10) + 1;
  } while (n1 + n2 > 20);
  ans = n1 + n2;
}

function showDots() {
  const el = document.getElementById('dots-display');
  el.innerHTML = '';
  const makeGroup = (count, color) => {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const d = document.createElement('span');
      d.className = 'dot';
      d.style.background = color;
      d.style.animationDelay = (i * 0.05) + 's';
      frag.appendChild(d);
    }
    return frag;
  };
  const c1 = dotColors[n1 % dotColors.length];
  const c2 = dotColors[(n2 + 4) % dotColors.length];
  el.appendChild(makeGroup(n1, c1));
  const sep = document.createElement('span');
  sep.className = 'dot-sep';
  sep.textContent = '＋';
  el.appendChild(sep);
  el.appendChild(makeGroup(n2, c2));
}

function buildButtons() {
  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  for (let i = 0; i <= 20; i++) {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.n = i;
    btn.textContent = i;
    btn.id = 'abtn-' + i;
    btn.setAttribute('aria-label', 'คำตอบ ' + i);
    btn.addEventListener('click', () => onAnswer(i, btn));
    grid.appendChild(btn);
  }
}

function showQ() {
  answered = false;
  const card = document.getElementById('question-card');
  card.classList.remove('new-question');
  void card.offsetWidth;
  card.classList.add('new-question');

  const el1 = document.getElementById('num1-el');
  const el2 = document.getElementById('num2-el');
  el1.textContent = n1;
  el2.textContent = n2;
  el1.style.animation = 'none'; el2.style.animation = 'none';
  void el1.offsetWidth;
  el1.style.animation = ''; el2.style.animation = '';

  const blank = document.getElementById('answer-blank');
  blank.className = 'blank-box empty';
  blank.textContent = '';

  showDots();

  document.querySelectorAll('.ans-btn').forEach(b => {
    b.className = 'ans-btn';
    b.disabled = false;
    b.style.opacity = '1';
    b.style.transform = '';
  });

  document.getElementById('next-btn').className = '';
  setBubble(rnd(prompts), 'neutral');
}

function onAnswer(chosen, btn) {
  if (answered) return;
  sfxClick();
  totalQ++;

  if (chosen === ans) {
    answered = true;
    totalC++;
    streak++;
    updateUI();

    const blank = document.getElementById('answer-blank');
    blank.className = 'blank-box filled';
    blank.textContent = ans;

    btn.classList.add('correct-anim');
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (b !== btn) { b.disabled = true; b.style.opacity = '0.3'; }
    });

    const m = document.getElementById('mascot');
    m.classList.remove('shake');
    void m.offsetWidth;
    m.classList.add('celebrate');
    setTimeout(() => m.classList.remove('celebrate'), 1900);

    if (streak >= 5 && streak % 5 === 0) {
      sfxStreak();
      launchConfetti(50);
      setBubble(`🔥 ชนะต่อเนื่อง ${streak} ครั้ง! ราชาคณิตศาสตร์! 👑`, 'super');
      showBadge('🏆');
      spawnStars(12);
    } else if (streak >= 3 && streak % 3 === 0) {
      sfxStreak();
      launchConfetti(32);
      setBubble(`⚡ ชนะต่อเนื่อง ${streak} ครั้ง! เก่งมากเลย! 🌟`, 'correct');
      showBadge('🎊');
      spawnStars(8);
    } else {
      sfxCorrect();
      launchConfetti(18);
      setBubble(rnd(correctMsgs), 'correct');
      showBadge('✅');
      spawnStars(5);
    }

    updateStars();
    setTimeout(() => { document.getElementById('next-btn').className = 'visible'; }, 700);

  } else {
    streak = 0;
    updateUI();

    btn.classList.add('wrong-anim');
    btn.disabled = true;
    btn.style.opacity = '0.3';

    const m = document.getElementById('mascot');
    m.classList.remove('celebrate');
    void m.offsetWidth;
    m.classList.add('shake');
    setTimeout(() => m.classList.remove('shake'), 520);

    sfxWrong();
    setBubble(rnd(wrongMsgs), 'wrong');
    showBadge('❌');
  }
}

function updateUI() {
  document.getElementById('streak-num').textContent = streak;
  document.getElementById('score-text').textContent = `ตอบถูก ${totalC} / ${totalQ}`;
  const badge = document.getElementById('streak-badge');
  badge.classList.remove('bump');
  void badge.offsetWidth;
  badge.classList.add('bump');
  const icon = badge.querySelector('.streak-icon');
  if (streak >= 5) icon.textContent = '🔥';
  else if (streak >= 3) icon.textContent = '⚡';
  else icon.textContent = '🏅';
}

function updateStars() {
  const idx = ((totalC - 1) % 5) + 1;
  if (totalC % 5 === 1 && totalC > 1) {
    for (let i = 1; i <= 5; i++) document.getElementById('star-' + i).classList.remove('lit');
  }
  const s = document.getElementById('star-' + idx);
  s.classList.add('lit');
}

function setBubble(msg, type) {
  const el = document.getElementById('speech-bubble');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  el.textContent = msg;
  const colors = {
    correct: { border: '#00C853', color: '#007A33' },
    super:   { border: '#FFD700', color: '#B8860B' },
    wrong:   { border: '#FF5252', color: '#B71C1C' },
    neutral: { border: '#FFB3D1', color: '#E91E8C' },
  };
  const c = colors[type] || colors.neutral;
  el.style.borderColor = c.border;
  el.style.color = c.color;
}

const cfEmoji = ['🌟','⭐','🎉','🎊','✨','🌈','💫','🎈','🎀','🍭','🌸','💖','🦋','🍀','🎯'];

function launchConfetti(count) {
  const layer = document.getElementById('confetti-layer');
  layer.innerHTML = '';
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf';
      el.textContent = cfEmoji[Math.floor(Math.random() * cfEmoji.length)];
      el.style.left = (Math.random() * 105 - 5) + 'vw';
      el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      const dur = 1.5 + Math.random() * 2.5;
      el.style.animation = `cfFall ${dur}s ${Math.random() < 0.5 ? 'linear' : 'ease-in'} forwards`;
      layer.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 100);
    }, Math.random() * 600);
  }
}

function showBadge(emoji) {
  const el = document.getElementById('big-badge');
  el.textContent = emoji;
  el.className = 'show';
  setTimeout(() => { el.className = 'hide'; }, 650);
}

function spawnStars(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-star';
      el.textContent = ['⭐','💫','✨','🌟'][Math.floor(Math.random() * 4)];
      el.style.left = (20 + Math.random() * 60) + 'vw';
      el.style.top = (30 + Math.random() * 40) + 'vh';
      el.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      el.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, Math.random() * 300);
  }
}

function nextQuestion() {
  sfxNext();
  if (Math.random() < 0.25) {
    mascotIdx = (mascotIdx + 1) % mascots.length;
    document.getElementById('mascot').textContent = mascots[mascotIdx];
  }
  genQ();
  showQ();
}

  'เธอเป็นอัจฉริยะคณิตศาสตร์! 🌟',
  'บวกกันแล้วได้เท่าไหร่นะ? 🤔',

  'เชื่อมั่นในตัวเอง เธอทำได้! ✨',
  'มาคำนวณด้วยกันเลย! 🎯',
];

  'สุดยอด! ถูกต้องมาก! สู้ต่อไป! 💫',
  'ว้าว! เธอเป็นอัจฉริยะคณิตศาสตร์! 🏆',
  'คำตอบถูกต้อง! เธอเก่งมากเลย! 🎈',
  'สมบูรณ์แบบ! อัจฉริยะคณิตศาสตร์! ✨',
];
const wrongMsgs = [
  'ไม่เป็นไร! ลองใหม่อีกครั้ง! 💪',
  'สู้ๆ! คิดอีกนิดนะ～ 🌈',
  'ยังไม่ถูก ลองต่อไปนะ! 😊',
  'ลองนับนิ้วอีกครั้งสิ! 🖐️',

  'ไม่มีปัญหา! ลองคำนวณอีกครั้ง! 🌟',
];

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

document.getElementById('mascot').addEventListener('click', () => {
  sfxClick();
  mascotIdx = (mascotIdx + 1) % mascots.length;
  document.getElementById('mascot').textContent = mascots[mascotIdx];
  spawnStars(3);
});

buildButtons();
genQ();
showQ();

document.addEventListener('pointerdown', () => { try { ctx(); } catch(e) {} }, { once: true });
</script>
